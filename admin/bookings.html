<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>予約管理｜KAJISHIFT管理画面</title>
  <link rel="preload" href="../css/style.css" as="style" />
  <link rel="stylesheet" href="../css/style.css" />
  <script src="../js/config.js"></script>
  <script src="../js/api.js" defer></script>
  <script src="../js/auth.js" defer></script>
</head>
<body class="admin-page">
<script>
// 認証チェック
if (typeof checkAuth === 'function') {
  if (!checkAuth('admin')) {
    // リダイレクトされる
  }
} else {
  // api.jsが読み込まれる前のフォールバック
  if (!localStorage.getItem('token')) {
    window.location.href = 'login.html';
  }
}
</script>

<header class="admin-header">
  <div class="admin-header-inner">
    <div class="admin-logo">KAJISHIFT 管理画面</div>
    <nav class="admin-nav">
      <a href="dashboard.html">ダッシュボード</a>
      <a href="users.html">利用者管理</a>
      <a href="workers.html">ワーカー管理</a>
      <a href="bookings.html" class="active">予約管理</a>
      <a href="payments.html">決済・売上</a>
      <a href="support.html">問い合わせ</a>
      <a href="settings.html">設定</a>
    </nav>
    <div class="admin-user-info">
      <span class="admin-role">システム管理者</span>
      <span class="admin-name">管理者 太郎</span>
      <button class="btn-icon" onclick="logout()">ログアウト</button>
    </div>
  </div>
</header>

<main class="admin-main">
  <div class="admin-container">
    
    <section class="admin-page-header">
      <h1>予約管理</h1>
    </section>

    <!-- 検索・フィルター -->
    <section class="admin-filter-section">
      <div class="filter-card">
        <div class="filter-row">
          <div class="filter-item">
            <label>予約ID</label>
            <input type="text" class="form-input" placeholder="予約IDで検索" />
          </div>
          <div class="filter-item">
            <label>日付</label>
            <input type="date" class="form-input" />
          </div>
          <div class="filter-item">
            <label>エリア</label>
            <select class="form-select">
              <option value="">すべて</option>
              <option value="sapporo">札幌市</option>
              <option value="ebetsu">江別市</option>
              <option value="kitahiroshima">北広島市</option>
              <option value="ishikari">石狩市</option>
            </select>
          </div>
          <div class="filter-item">
            <label>ワーカー</label>
            <input type="text" class="form-input" placeholder="ワーカー名で検索" />
          </div>
          <div class="filter-item">
            <label>利用者</label>
            <input type="text" class="form-input" placeholder="利用者名で検索" />
          </div>
          <div class="filter-item">
            <button class="btn btn-primary">検索</button>
            <button class="btn btn-outline">リセット</button>
          </div>
        </div>
      </div>
    </section>

    <!-- ステータスタブ -->
    <section class="admin-section">
      <div class="tab-nav">
        <button class="tab-btn active" data-tab="confirmed" data-status="CONFIRMED">確定 (<span id="confirmed-count">-</span>)</button>
        <button class="tab-btn" data-tab="pending" data-status="PENDING">待機中 (<span id="pending-count">-</span>)</button>
        <button class="tab-btn" data-tab="completed" data-status="COMPLETED">完了 (<span id="completed-count">-</span>)</button>
        <button class="tab-btn" data-tab="cancelled" data-status="CANCELLED">キャンセル (<span id="cancelled-count">-</span>)</button>
      </div>

      <!-- 確定タブ -->
      <div class="tab-content active" id="confirmed-tab">
        <div class="section-header">
          <h2 class="section-title">確定予約（<span id="confirmed-title-count">-</span>件）</h2>
          <div class="export-buttons">
            <button class="btn btn-outline btn-small" onclick="exportBookings('CONFIRMED', this)">CSVエクスポート</button>
            <button class="btn btn-outline btn-small" onclick="exportBookingsExcel('CONFIRMED', this)">Excelエクスポート</button>
          </div>
        </div>
        <div class="admin-table-container">
          <table class="admin-table">
            <thead>
              <tr>
                <th>予約ID</th>
                <th>日時</th>
                <th>利用者</th>
                <th>ワーカー</th>
                <th>サービス</th>
                <th>場所</th>
                <th>金額</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="confirmed-table-body">
              <tr>
                <td colspan="8" class="loading-message">読み込み中...</td>
              </tr>
            </tbody>
          </table>
        </div>
        <div class="pagination" id="confirmed-pagination"></div>
      </div>

      <!-- 待機中タブ -->
      <div class="tab-content" id="pending-tab">
        <div class="section-header">
          <h2 class="section-title">待機中予約（<span id="pending-title-count">-</span>件）</h2>
          <div class="export-buttons">
            <button class="btn btn-outline btn-small" onclick="exportBookings('PENDING', this)">CSVエクスポート</button>
            <button class="btn btn-outline btn-small" onclick="exportBookingsExcel('PENDING', this)">Excelエクスポート</button>
          </div>
        </div>
        <div class="admin-table-container">
          <table class="admin-table">
            <thead>
              <tr>
                <th>予約ID</th>
                <th>日時</th>
                <th>利用者</th>
                <th>サービス</th>
                <th>場所</th>
                <th>状態</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="pending-table-body">
              <tr>
                <td colspan="7" class="loading-message">読み込み中...</td>
              </tr>
            </tbody>
          </table>
        </div>
        <div class="pagination" id="pending-pagination"></div>
      </div>

      <!-- 完了タブ -->
      <div class="tab-content" id="completed-tab">
        <div class="section-header">
          <h2 class="section-title">完了予約（<span id="completed-title-count">-</span>件）</h2>
          <div class="export-buttons">
            <button class="btn btn-outline btn-small" onclick="exportBookings('COMPLETED', this)">CSVエクスポート</button>
            <button class="btn btn-outline btn-small" onclick="exportBookingsExcel('COMPLETED', this)">Excelエクスポート</button>
          </div>
        </div>
        <div class="admin-table-container">
          <table class="admin-table">
            <thead>
              <tr>
                <th>予約ID</th>
                <th>日時</th>
                <th>利用者</th>
                <th>ワーカー</th>
                <th>サービス</th>
                <th>場所</th>
                <th>金額</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="completed-table-body">
              <tr>
                <td colspan="8" class="loading-message">読み込み中...</td>
              </tr>
            </tbody>
          </table>
        </div>
        <div class="pagination" id="completed-pagination"></div>
      </div>

      <!-- キャンセルタブ -->
      <div class="tab-content" id="cancelled-tab">
        <div class="section-header">
          <h2 class="section-title">キャンセル予約（<span id="cancelled-title-count">-</span>件）</h2>
          <div class="export-buttons">
            <button class="btn btn-outline btn-small" onclick="exportBookings('CANCELLED', this)">CSVエクスポート</button>
            <button class="btn btn-outline btn-small" onclick="exportBookingsExcel('CANCELLED', this)">Excelエクスポート</button>
          </div>
        </div>
        <div class="admin-table-container">
          <table class="admin-table">
            <thead>
              <tr>
                <th>予約ID</th>
                <th>日時</th>
                <th>利用者</th>
                <th>ワーカー</th>
                <th>キャンセル料</th>
                <th>理由</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="cancelled-table-body">
              <tr>
                <td colspan="7" class="loading-message">読み込み中...</td>
              </tr>
            </tbody>
          </table>
        </div>
        <div class="pagination" id="cancelled-pagination"></div>
      </div>
    </section>

  </div>
</main>

<!-- キャンセルモーダル -->
<div class="modal" id="cancelModal">
  <div class="modal-content">
    <h2>予約をキャンセル</h2>
    <div class="form-group">
      <label>キャンセル理由</label>
      <select class="form-select">
        <option>利用者都合</option>
        <option>ワーカー都合</option>
        <option>運営都合</option>
        <option>その他</option>
      </select>
    </div>
    <div class="form-group">
      <label>キャンセル料</label>
      <div class="cancellation-fee-options">
        <label class="radio-item">
          <input type="radio" name="fee-type" value="auto" checked />
          <span>自動計算（ポリシーに基づく）</span>
        </label>
        <label class="radio-item">
          <input type="radio" name="fee-type" value="manual" />
          <span>手動設定</span>
        </label>
      </div>
      <input type="number" class="form-input mt-8" id="manualFee" placeholder="0" disabled />
    </div>
    <div class="form-group">
      <label>メモ</label>
      <textarea class="form-textarea" rows="3" placeholder="キャンセルに関するメモ"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn btn--outline btn-action" onclick="closeModal('cancelModal')">キャンセル</button>
      <button class="btn btn-danger" onclick="confirmCancel()">キャンセル確定</button>
    </div>
  </div>
</div>

<script>
let currentTab = 'confirmed';
let currentStatus = 'CONFIRMED';
let currentPage = {};
let totalPages = {};

document.addEventListener('DOMContentLoaded', async () => {
  // 認証チェック
  if (!checkAuth('admin')) {
    return;
  }

  // タブ切り替え
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', function() {
      const tab = this.dataset.tab;
      const status = this.dataset.status;
      currentTab = tab;
      currentStatus = status;
      currentPage[status] = 1;
      
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      this.classList.add('active');
      document.getElementById(tab + '-tab').classList.add('active');
      
      loadBookings(status, 1);
    });
  });

  // 検索ボタン
  document.querySelector('.filter-section .btn-primary').addEventListener('click', () => {
    loadBookings(currentStatus, 1);
  });

  // リセットボタン
  document.querySelector('.filter-section .btn-outline').addEventListener('click', () => {
    document.querySelectorAll('.filter-section input, .filter-section select').forEach(el => {
      if (el.type === 'text' || el.type === 'date') {
        el.value = '';
      } else if (el.tagName === 'SELECT') {
        el.selectedIndex = 0;
      }
    });
    loadBookings(currentStatus, 1);
  });

  // 初期データ読み込み
  await loadBookings('CONFIRMED', 1);
  await loadBookingCounts();
});

async function loadBookingCounts() {
  try {
    const [confirmed, pending, completed, cancelled] = await Promise.all([
      api.getBookings({ status: 'CONFIRMED', limit: 1 }),
      api.getBookings({ status: 'PENDING', limit: 1 }),
      api.getBookings({ status: 'COMPLETED', limit: 1 }),
      api.getBookings({ status: 'CANCELLED', limit: 1 })
    ]);

    document.getElementById('confirmed-count').textContent = confirmed.data?.pagination?.total || 0;
    document.getElementById('pending-count').textContent = pending.data?.pagination?.total || 0;
    document.getElementById('completed-count').textContent = completed.data?.pagination?.total || 0;
    document.getElementById('cancelled-count').textContent = cancelled.data?.pagination?.total || 0;
  } catch (error) {
    console.error('予約数の取得エラー:', error);
  }
}

async function loadBookings(status, page) {
  try {
    const filters = {
      status: status,
      page: page,
      limit: 20
    };

    // 検索フィルターを追加
    const bookingId = document.querySelector('.filter-section input[placeholder*="予約ID"]')?.value;
    const date = document.querySelector('.filter-section input[type="date"]')?.value;
    const area = document.querySelector('.filter-section select')?.value;
    const workerName = document.querySelector('.filter-section input[placeholder*="ワーカー名"]')?.value;
    const customerName = document.querySelector('.filter-section input[placeholder*="利用者名"]')?.value;

    if (bookingId) filters.id = bookingId;
    if (date) {
      filters.startDate = date;
      filters.endDate = date;
    }
    if (workerName) filters.workerName = workerName;
    if (customerName) filters.customerName = customerName;

    const response = await api.getBookings(filters);
    
    if (response.data && response.data.bookings) {
      const bookings = response.data.bookings;
      const pagination = response.data.pagination;
      
      currentPage[status] = pagination.page;
      totalPages[status] = pagination.totalPages;

      displayBookings(status, bookings);
      updatePagination(status, pagination);
    } else {
      throw new Error('予期しないレスポンス形式');
    }
  } catch (error) {
    console.error('予約一覧の読み込みエラー:', error);
    showError('予約一覧の読み込みに失敗しました: ' + (error.message || 'エラーが発生しました'));
  }
}

function displayBookings(status, bookings) {
  const tbodyId = `${status}-table-body`;
  const tbody = document.getElementById(tbodyId);
  tbody.innerHTML = '';

  if (bookings.length === 0) {
    tbody.innerHTML = `<tr><td colspan="8" class="empty-message">予約がありません</td></tr>`;
    return;
  }

  bookings.forEach(booking => {
    const scheduledDate = new Date(booking.scheduledDate);
    const startTime = booking.startTime || '00:00';
    const duration = booking.duration || 0;
    const [hours, minutes] = startTime.split(':').map(Number);
    const endTime = new Date(scheduledDate);
    endTime.setHours(hours + duration, minutes, 0, 0);
    
    const dateStr = scheduledDate.toLocaleDateString('ja-JP', { year: 'numeric', month: 'long', day: 'numeric' });
    const timeRange = `${startTime}-${endTime.toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' })}`;
    
    const customerName = booking.customer?.name || '未定';
    const workerName = booking.worker?.name || '未定';
    const serviceType = booking.serviceType || '-';
    const address = booking.address || '-';
    const amount = booking.totalAmount ? `¥${booking.totalAmount.toLocaleString()}` : '未確定';

    if (status === 'PENDING') {
      const row = `
        <tr>
          <td>#${booking.id.substring(0, 8)}</td>
          <td>${dateStr}<br>${timeRange}</td>
          <td>${customerName}</td>
          <td>${serviceType}</td>
          <td>${address}</td>
          <td><span class="status-badge pending">ワーカー待ち</span></td>
          <td><a href="booking-detail.html?id=${booking.id}" class="btn-link">詳細</a></td>
        </tr>
      `;
      tbody.insertAdjacentHTML('beforeend', row);
    } else if (status === 'CANCELLED') {
      const row = `
        <tr>
          <td>#${booking.id.substring(0, 8)}</td>
          <td>${dateStr}<br>${timeRange}</td>
          <td>${customerName}</td>
          <td>${workerName}</td>
          <td>¥0</td>
          <td>${booking.cancellationReason || '理由不明'}</td>
          <td><a href="booking-detail.html?id=${booking.id}" class="btn-link">詳細</a></td>
        </tr>
      `;
      tbody.insertAdjacentHTML('beforeend', row);
    } else {
      const row = `
        <tr>
          <td>#${booking.id.substring(0, 8)}</td>
          <td>${dateStr}<br>${timeRange}</td>
          <td>${customerName}</td>
          <td>${workerName}</td>
          <td>${serviceType}</td>
          <td>${address}</td>
          <td>${amount}</td>
          <td>
            <a href="booking-detail.html?id=${booking.id}" class="btn-link">詳細</a>
            ${status === 'CONFIRMED' ? `<button class="btn-link" onclick="openCancelModal('${booking.id}')">キャンセル</button>` : ''}
          </td>
        </tr>
      `;
      tbody.insertAdjacentHTML('beforeend', row);
    }
  });

  // タイトルの件数を更新
  const titleCountId = `${status}-title-count`;
  const titleCount = document.getElementById(titleCountId);
  if (titleCount) {
    titleCount.textContent = bookings.length;
  }
}

function updatePagination(status, pagination) {
  const paginationId = `${status}-pagination`;
  const paginationEl = document.getElementById(paginationId);
  if (!paginationEl) return;

  paginationEl.innerHTML = `
    <button class="btn btn-outline" ${pagination.page <= 1 ? 'disabled' : ''} onclick="loadBookings('${status}', ${pagination.page - 1})">前へ</button>
    <span class="page-info">${pagination.page} / ${pagination.totalPages}</span>
    <button class="btn btn-outline" ${pagination.page >= pagination.totalPages ? 'disabled' : ''} onclick="loadBookings('${status}', ${pagination.page + 1})">次へ</button>
  `;
}

function openCancelModal(bookingId) {
  document.getElementById('cancelModal').dataset.bookingId = bookingId;
  document.getElementById('cancelModal').classList.add('is-open');
}

function closeModal(modalId) {
  document.getElementById(modalId).classList.remove('is-open');
}

async function confirmCancel() {
  const bookingId = document.getElementById('cancelModal').dataset.bookingId;
  if (!bookingId) return;

  if (!confirm('本当にキャンセルしますか？')) {
    return;
  }

  try {
    await api.updateBooking(bookingId, {
      status: 'CANCELLED'
    });
    
    alert('予約をキャンセルしました');
    closeModal('cancelModal');
    await loadBookings(currentStatus, currentPage[currentStatus]);
    await loadBookingCounts();
  } catch (error) {
    console.error('キャンセルエラー:', error);
    showError('キャンセルに失敗しました: ' + (error.message || 'エラーが発生しました'));
  }
}

async function exportBookings(status, buttonElement) {
  try {
    // 日付範囲を取得（フィルターから）
    const dateInput = document.querySelector('.admin-filter-section input[type="date"]');
    const startDate = dateInput?.value || '';
    const endDate = dateInput?.value || '';

    const params = {};
    if (startDate) {
      params.startDate = startDate;
    }
    if (endDate) {
      params.endDate = endDate;
    }
    // ステータスフィルターを追加
    if (status) {
      params.status = status;
    }

    // ローディング表示
    const button = buttonElement || document.querySelector(`button[onclick*="exportBookings('${status}')"]`);
    const originalText = button?.textContent || 'CSVエクスポート';
    if (button) {
      button.disabled = true;
      button.textContent = 'エクスポート中...';
    }

    const result = await api.downloadCSV('bookings', params);
    
    if (button) {
      button.disabled = false;
      button.textContent = originalText;
    }
    
    showSuccess('CSVファイルをダウンロードしました: ' + (result.filename || 'bookings-report.csv'));
  } catch (error) {
    console.error('CSVエクスポートエラー:', error);
    showError('CSVエクスポートに失敗しました: ' + (error.message || 'エラーが発生しました'));
    
    // ボタンを復元
    const button = buttonElement || document.querySelector(`button[onclick*="exportBookings('${status}')"]`);
    if (button) {
      button.disabled = false;
      button.textContent = 'CSVエクスポート';
    }
  }
}

// Excelエクスポート機能
async function exportBookingsExcel(status, buttonElement) {
  try {
    // 日付範囲を取得（フィルターから）
    const dateInput = document.querySelector('.admin-filter-section input[type="date"]');
    const startDate = dateInput?.value || '';
    const endDate = dateInput?.value || '';

    const params = {};
    if (startDate) {
      params.startDate = startDate;
    }
    if (endDate) {
      params.endDate = endDate;
    }
    // ステータスフィルターを追加
    if (status) {
      params.status = status;
    }

    // ローディング表示
    const button = buttonElement || document.querySelector(`button[onclick*="exportBookingsExcel('${status}')"]`);
    const originalText = button?.textContent || 'Excelエクスポート';
    if (button) {
      button.disabled = true;
      button.textContent = 'エクスポート中...';
    }

    const result = await api.downloadExcel('bookings', params);
    
    if (button) {
      button.disabled = false;
      button.textContent = originalText;
    }
    
    showSuccess('Excelファイルをダウンロードしました: ' + (result.filename || 'bookings-report.xlsx'));
  } catch (error) {
    console.error('Excelエクスポートエラー:', error);
    showError('Excelエクスポートに失敗しました: ' + (error.message || 'エラーが発生しました'));
    
    // ボタンを復元
    const button = buttonElement || document.querySelector(`button[onclick*="exportBookingsExcel('${status}')"]`);
    if (button) {
      button.disabled = false;
      button.textContent = 'Excelエクスポート';
    }
  }
}

// 手動設定の有効/無効
document.querySelectorAll('input[name="fee-type"]').forEach(radio => {
  radio.addEventListener('change', function() {
    const manualFee = document.getElementById('manualFee');
    manualFee.disabled = this.value !== 'manual';
  });
});

window.onclick = function(event) {
  if (event.target.classList.contains('modal')) {
    event.target.classList.remove('is-open');
  }
}

function showError(message) {
  alert('エラー: ' + message);
}

function showSuccess(message) {
  alert('成功: ' + message);
}

function logout() {
  if (confirm('ログアウトしますか？')) {
    api.clearToken();
    sessionStorage.removeItem('adminLoggedIn');
    window.location.href = 'login.html';
  }
}
</script>

</body>
</html>
