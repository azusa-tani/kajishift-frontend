<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>500 - サーバーエラー｜KAJISHIFT</title>
  <meta name="description" content="サーバーエラーが発生しました。" />
  <meta name="robots" content="noindex, nofollow" />
  <link rel="canonical" href="https://kajishift.jp/errors/500.html" />
  <link rel="preload" href="../css/style.css" as="style" />
  <link rel="stylesheet" href="../css/style.css" />
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <script src="../js/config.js"></script>
  <script src="../js/api.js" defer></script>
  <script src="../js/auth.js" defer></script>
  <script src="../js/socket.js" defer></script>
</head>
<body class="error-page">
  <div class="error-container">
    <div class="error-content" role="alert">
      <div class="error-code" aria-hidden="true">500</div>
      <h1 class="error-title">サーバーエラーが発生しました</h1>
      <p class="error-message">
        申し訳ございません。サーバーでエラーが発生しました。<br>
        しばらく時間をおいてから再度お試しください。
      </p>
      <div class="error-actions">
        <a href="../index.html" class="btn btn--primary" aria-label="ホームページに戻る">ホームページに戻る</a>
        <button onclick="location.reload()" class="btn btn--secondary" aria-label="ページを再読み込み">ページを再読み込み</button>
      </div>
      <div class="error-links">
        <a href="../customer/dashboard.html">依頼者向けページ</a>
        <a href="../worker/dashboard.html">ワーカー向けページ</a>
        <a href="../admin/login.html">管理画面</a>
      </div>
    </div>
  </div>
</body>
</html>
