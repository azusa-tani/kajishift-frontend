<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>403 - アクセス権限がありません｜KAJISHIFT</title>
  <meta name="description" content="このページへのアクセスは許可されていません。" />
  <meta name="robots" content="noindex, nofollow" />
  <link rel="canonical" href="https://kajishift.jp/errors/403.html" />
  <link rel="preload" href="../css/style.css" as="style" />
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body class="error-page">
  <div class="error-container">
    <div class="error-content" role="alert">
      <div class="error-code" aria-hidden="true">403</div>
      <h1 class="error-title">アクセス権限がありません</h1>
      <p class="error-message">
        このページにアクセスする権限がありません。<br>
        ログインが必要な場合は、ログインページからアクセスしてください。
      </p>
      <div class="error-actions">
        <a href="../index.html" class="btn btn--primary" aria-label="ホームページに戻る">ホームページに戻る</a>
        <a href="../customer/login.html" class="btn btn--secondary" aria-label="ログインページへ移動">ログインページへ</a>
      </div>
      <div class="error-links">
        <a href="../customer/login.html">依頼者ログイン</a>
        <a href="../worker/login.html">ワーカーログイン</a>
        <a href="../admin/login.html">管理画面ログイン</a>
      </div>
    </div>
  </div>
</body>
</html>
