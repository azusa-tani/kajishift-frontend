<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 - ページが見つかりません｜KAJISHIFT</title>
  <meta name="description" content="お探しのページが見つかりませんでした。" />
  <meta name="robots" content="noindex, nofollow" />
  <link rel="canonical" href="https://kajishift.jp/errors/404.html" />
  <link rel="preload" href="../css/style.css" as="style" />
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body class="error-page">
  <div class="error-container">
    <div class="error-content" role="alert">
      <div class="error-code" aria-hidden="true">404</div>
      <h1 class="error-title">ページが見つかりません</h1>
      <p class="error-message">
        お探しのページは存在しないか、移動または削除された可能性があります。
      </p>
      <div class="error-actions">
        <a href="../index.html" class="btn btn--primary" aria-label="ホームページに戻る">ホームページに戻る</a>
        <button onclick="history.back()" class="btn btn--secondary" aria-label="前のページに戻る">前のページに戻る</button>
      </div>
      <div class="error-links">
        <a href="../customer/dashboard.html">依頼者向けページ</a>
        <a href="../worker/dashboard.html">ワーカー向けページ</a>
        <a href="../admin/login.html">管理画面</a>
      </div>
    </div>
  </div>
</body>
</html>
