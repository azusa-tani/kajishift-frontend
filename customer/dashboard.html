<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>マイページ｜KAJISHIFT</title>
  <meta name="description" content="KAJISHIFTの依頼者マイページ。予約状況やメッセージを確認できます。" />
  <meta name="robots" content="noindex, nofollow" />
  <link rel="canonical" href="https://kajishift.jp/customer/dashboard.html" />
  <link rel="preload" href="../css/style.css" as="style" />
  <link rel="stylesheet" href="../css/style.css" />
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <script src="../js/config.js"></script>
  <script src="../js/api.js" defer></script>
  <script src="../js/auth.js" defer></script>
  <script src="../js/socket.js" defer></script>
</head>
<body class="customer-page">
<script>
function escapeHtml(text) {
  if (text == null) return '';
  const div = document.createElement('div');
  div.textContent = String(text);
  return div.innerHTML;
}

function parseUnreadCount(response) {
  if (response && response.data && typeof response.data.count === 'number') {
    return response.data.count;
  }
  if (response && typeof response.count === 'number') {
    return response.count;
  }
  return 0;
}

function formatNoticeTime(iso) {
  const d = new Date(iso);
  if (Number.isNaN(d.getTime())) return '';
  const diffMs = Date.now() - d.getTime();
  const mins = Math.floor(diffMs / 60000);
  if (mins < 1) return 'たった今';
  if (mins < 60) return `${mins}分前`;
  const hours = Math.floor(mins / 60);
  if (hours < 24) return `${hours}時間前`;
  const days = Math.floor(hours / 24);
  if (days < 7) return `${days}日前`;
  return d.toLocaleDateString('ja-JP', { month: 'short', day: 'numeric' });
}

function noticeIconForType(type) {
  const map = {
    MESSAGE: '💬',
    BOOKING_UPDATE: '📋',
    BOOKING_CREATED: '📅',
    BOOKING_CANCELLED: '⚠️',
    REVIEW: '⭐',
    PAYMENT: '💳',
    PAYMENT_FAILED: '❌',
    SYSTEM: '📢',
    WORKER_APPROVED: '✅',
    WORKER_REJECTED: '📢',
  };
  return map[type] || '📢';
}

function noticeBadgeHtml(type, label) {
  const cls =
    type === 'SYSTEM' || type === 'PAYMENT_FAILED' || type === 'WORKER_REJECTED'
      ? 'notice-badge notice-badge--important'
      : 'notice-badge notice-badge--message';
  return `<span class="${cls}">${escapeHtml(label)}</span>`;
}

// 認証チェック
document.addEventListener('DOMContentLoaded', async function() {
  if (!checkAuth('customer')) {
    return;
  }

  const token = localStorage.getItem('token');
  if (token && typeof socketManager !== 'undefined') {
    socketManager.ensureConnected(token);
    socketManager.onUnreadCount((count) => {
      updateNotificationBadge(count);
    });
    socketManager.onNotification(() => {
      updateUnreadCount();
      loadDashboardNotifications();
    });
  }

  try {
    const userResponse = await api.getMe();
    if (userResponse.data) {
      const user = userResponse.data;
      const welcomeTitle = document.querySelector('.welcome-section h1');
      if (welcomeTitle && user.name) {
        welcomeTitle.textContent = `おかえりなさい、${user.name}さん`;
      }
      const welcomeSub = document.getElementById('welcomeSubtext');
      if (welcomeSub) {
        welcomeSub.textContent = '予約・決済・お知らせは下記から確認できます。';
      }
    }

    const bookingsResponse = await api.getBookings({
      status: 'PENDING,CONFIRMED,IN_PROGRESS',
      limit: 3,
    });
    const bookings =
      bookingsResponse.data?.bookings ||
      (Array.isArray(bookingsResponse.data) ? bookingsResponse.data : []);
    updateUpcomingBookings(bookings);

    await updateUnreadCount();
    await loadRecentPayments();
    await loadDashboardNotifications();
  } catch (error) {
    console.error('データ取得エラー:', error);
  }
});

async function updateUnreadCount() {
  try {
    const notificationResponse = await api.getUnreadNotificationCount();
    updateNotificationBadge(parseUnreadCount(notificationResponse));
  } catch (error) {
    console.error('未読通知数取得エラー:', error);
  }
}

function updateNotificationBadge(count) {
  const n = typeof count === 'number' && !Number.isNaN(count) ? count : 0;
  const notificationBadge = document.querySelector('.notification-badge');
  if (notificationBadge) {
    if (n > 0) {
      notificationBadge.textContent = String(n);
      notificationBadge.classList.remove('is-hidden');
    } else {
      notificationBadge.classList.add('is-hidden');
    }
  }
}

function shortenAddressForCard(addr, maxLen) {
  const limit = maxLen == null ? 34 : maxLen;
  if (!addr || typeof addr !== 'string') return '';
  const s = addr.trim().replace(/\s+/g, ' ');
  const parts = s.split(/[、,，]/);
  if (parts.length >= 2) {
    const short = `${parts[0].trim()}、${parts[1].trim()}`;
    if (short.length <= limit) return short;
  }
  if (s.length <= limit) return s;
  return s.slice(0, limit - 1) + '…';
}

function ratingStarsHtml(rating) {
  const n = Number(rating);
  if (Number.isNaN(n) || n < 0) return '';
  const rounded = Math.min(5, Math.max(0, Math.round(n)));
  const filled = '★'.repeat(rounded);
  const empty = '☆'.repeat(5 - rounded);
  return `<span class="customer-upcoming-stars" aria-hidden="true">${filled}${empty}</span>`;
}

function workerInitial(name) {
  if (!name || typeof name !== 'string') return '?';
  const t = name.trim();
  return t ? t.charAt(0) : '?';
}

function updateUpcomingBookings(bookings) {
  const track = document.getElementById('dashboardUpcomingBookings');
  if (!track) return;

  track.innerHTML = '';

  if (!bookings || bookings.length === 0) {
    track.innerHTML = '<p class="no-data customer-upcoming-empty">今後の予約はありません</p>';
    return;
  }

  const timeFormatter = new Intl.DateTimeFormat('ja-JP', {
    hour: '2-digit',
    minute: '2-digit',
  });
  const dowFmt = new Intl.DateTimeFormat('ja-JP', { weekday: 'short' });

  bookings.forEach((booking) => {
    const statusBadgeClass = {
      PENDING: 'customer-upcoming-badge--confirmed',
      CONFIRMED: 'customer-upcoming-badge--confirmed',
      IN_PROGRESS: 'customer-upcoming-badge--progress',
      COMPLETED: 'customer-upcoming-badge--done',
      CANCELLED: 'customer-upcoming-badge--cancelled',
    };
    const statusText =
      {
        PENDING: '予約確定',
        CONFIRMED: '予約確定',
        IN_PROGRESS: '進行中',
        COMPLETED: '完了',
        CANCELLED: 'キャンセル',
      }[booking.status] || booking.status;

    const startDate = booking.startTime
      ? new Date(booking.startTime)
      : booking.scheduledDate
        ? new Date(booking.scheduledDate)
        : null;
    const endDate = booking.endTime ? new Date(booking.endTime) : null;
    const duration = booking.duration || 2;

    const hasValidStart = startDate && !Number.isNaN(startDate.getTime());

    let timeLine = '';
    if (hasValidStart) {
      if (endDate && !Number.isNaN(endDate.getTime())) {
        timeLine = `${timeFormatter.format(startDate)}〜${timeFormatter.format(endDate)}`;
      } else {
        const estimatedEnd = new Date(startDate.getTime() + duration * 60 * 60 * 1000);
        timeLine = `${timeFormatter.format(startDate)}〜${timeFormatter.format(estimatedEnd)}（目安）`;
      }
    } else {
      timeLine = '日時は調整中です。確定次第お知らせします。';
    }

    let dateboxHtml = '';
    if (hasValidStart) {
      const dayNum = startDate.getDate();
      const dow = dowFmt.format(startDate);
      const monthLabel = `${startDate.getMonth() + 1}月`;
      dateboxHtml = `
        <aside class="customer-upcoming-datebox" aria-label="予約日">
          <span class="customer-upcoming-datebox__day">${dayNum}</span>
          <span class="customer-upcoming-datebox__dow">${escapeHtml(dow)}</span>
          <span class="customer-upcoming-datebox__month">${escapeHtml(monthLabel)}</span>
        </aside>`;
    } else {
      dateboxHtml = `
        <aside class="customer-upcoming-datebox customer-upcoming-datebox--pending" aria-label="日時未確定">
          <span class="customer-upcoming-datebox__icon" aria-hidden="true">📅</span>
          <span class="customer-upcoming-datebox__pending-label">調整中</span>
        </aside>`;
    }

    const serviceLabel = escapeHtml(booking.serviceType || 'サービス');
    const worker = booking.worker;
    const workerName = worker ? escapeHtml(worker.name || '') : '';
    const ratingNum =
      worker && worker.rating != null && !Number.isNaN(Number(worker.rating))
        ? Number(worker.rating).toFixed(1)
        : '';
    const starsHtml = ratingNum ? ratingStarsHtml(worker.rating) : '';
    const avatarLetter = escapeHtml(workerInitial(worker ? worker.name : ''));
    const avatarImg =
      worker && worker.profileImageUrl
        ? `<img class="customer-upcoming-avatar__img" src="${escapeHtml(worker.profileImageUrl)}" alt="" width="40" height="40" loading="lazy" />`
        : `<span class="customer-upcoming-avatar__fallback" aria-hidden="true">${avatarLetter}</span>`;

    const addressShort = booking.address ? shortenAddressForCard(booking.address) : '';
    const addressHtml = addressShort
      ? `<p class="customer-upcoming-card__address" title="${escapeHtml(booking.address)}">📍 ${escapeHtml(addressShort)}</p>`
      : '';

    const workerRow =
      workerName || starsHtml
        ? `<div class="customer-upcoming-worker">
            <div class="customer-upcoming-avatar">${avatarImg}</div>
            <div class="customer-upcoming-worker__text">
              <div class="customer-upcoming-worker__name-row">
                <span class="customer-upcoming-worker__name">${workerName ? `${workerName}さん` : 'ワーカー未定'}</span>
                ${
                  ratingNum
                    ? `<span class="customer-upcoming-worker__rating-wrap">${starsHtml}<span class="customer-upcoming-rating-num">${ratingNum}</span></span>`
                    : ''
                }
              </div>
            </div>
          </div>`
        : `<div class="customer-upcoming-worker">
            <div class="customer-upcoming-avatar"><span class="customer-upcoming-avatar__fallback" aria-hidden="true">?</span></div>
            <div class="customer-upcoming-worker__text"><span class="customer-upcoming-worker__name">ワーカー未定</span></div>
          </div>`;

    const badgeClass = statusBadgeClass[booking.status] || 'customer-upcoming-badge--confirmed';

    const card = document.createElement('article');
    card.className = 'customer-upcoming-card';
    card.setAttribute('role', 'group');
    const ariaSvc = String(booking.serviceType || '予約').replace(/["<>]/g, '');
    card.setAttribute(
      'aria-label',
      `${hasValidStart ? `${startDate.getMonth() + 1}月${startDate.getDate()}日` : '日時調整中'}の${ariaSvc}`
    );
    card.innerHTML = `
      <span class="customer-upcoming-badge ${badgeClass}">${escapeHtml(statusText)}</span>
      <div class="customer-upcoming-card__inner">
        ${dateboxHtml}
        <div class="customer-upcoming-card__main">
          <h3 class="customer-upcoming-card__title">${serviceLabel}</h3>
          <p class="customer-upcoming-card__time">${escapeHtml(timeLine)}</p>
          ${workerRow}
          ${addressHtml}
          <div class="customer-upcoming-card__actions">
            <a href="booking-detail.html?id=${escapeHtml(booking.id)}" class="btn btn--outline btn-small customer-upcoming-card__btn">詳細を見る</a>
          </div>
        </div>
      </div>
    `;
    track.appendChild(card);
  });
}

async function loadRecentPayments() {
  const mount = document.getElementById('dashboardRecentPayments');
  if (!mount) return;
  mount.innerHTML = '<div class="loading-message">読み込み中...</div>';
  try {
    const response = await api.getPayments({ limit: 100 });
    const list = response.data?.payments || [];
    const sorted = [...list].sort(
      (a, b) => new Date(b.createdAt || 0) - new Date(a.createdAt || 0)
    );
    renderRecentPayments(sorted.slice(0, 8));
  } catch (error) {
    console.error('決済履歴の取得エラー:', error);
    mount.innerHTML =
      '<div class="error-message">利用履歴の読み込みに失敗しました</div>';
  }
}

function paymentStatusLabel(status) {
  const map = {
    COMPLETED: '支払済み',
    PENDING: '支払い待ち',
    FAILED: '支払い失敗',
    REFUNDED: '返金済み',
  };
  return map[status] || status || '-';
}

function renderRecentPayments(payments) {
  const mount = document.getElementById('dashboardRecentPayments');
  if (!mount) return;

  if (!payments || payments.length === 0) {
    mount.innerHTML = '<div class="empty-message">利用履歴はありません</div>';
    return;
  }

  mount.innerHTML = payments
    .map((payment) => {
      const paymentDate = new Date(payment.createdAt);
      const dateStr = Number.isNaN(paymentDate.getTime())
        ? '-'
        : paymentDate.toLocaleDateString('ja-JP', {
            year: 'numeric',
            month: 'long',
            day: 'numeric',
          });
      const serviceType = escapeHtml(
        payment.booking ? payment.booking.serviceType || '-' : '-'
      );
      const workerName =
        payment.booking && payment.booking.worker
          ? escapeHtml(payment.booking.worker.name || '不明')
          : '-';
      const amount =
        payment.amount != null ? `¥${Number(payment.amount).toLocaleString()}` : '-';
      const booking = payment.booking;
      let footer = '';
      if (booking && booking.id) {
        if (booking.status === 'COMPLETED' && !booking.reviewed) {
          footer = `<div class="history-card__footer">
            <a href="booking-detail.html?id=${escapeHtml(booking.id)}&review=true" class="btn btn-small btn--outline">レビュー</a>
          </div>`;
        } else if (booking.reviewed || booking.review) {
          footer = `<div class="history-card__footer"><span class="reviewed-badge">レビュー済み</span></div>`;
        } else {
          footer = `<div class="history-card__footer">
            <a href="booking-detail.html?id=${escapeHtml(booking.id)}" class="btn btn-small btn--outline">詳細</a>
          </div>`;
        }
      } else {
        footer = `<div class="history-card__footer"><span class="text-muted">${escapeHtml(
          paymentStatusLabel(payment.status)
        )}</span></div>`;
      }

      return `
        <article class="history-card">
          <div class="history-card__header">
            <span class="history-card__date">${escapeHtml(dateStr)}</span>
            <span class="history-card__amount">${escapeHtml(amount)}</span>
          </div>
          <div class="history-card__body">
            <h4 class="history-card__title">${serviceType}</h4>
            <p class="history-card__meta">👤 ${workerName === '-' ? '-' : `${workerName}さん`}</p>
          </div>
          ${footer}
        </article>
      `;
    })
    .join('');
}

async function loadDashboardNotifications() {
  const mount = document.getElementById('dashboardNoticeList');
  if (!mount) return;
  mount.innerHTML = '<div class="loading-message">読み込み中...</div>';
  try {
    const response = await api.getNotifications({ page: 1, limit: 6 });
    const payload = response.data || {};
    const notifications = payload.notifications || [];
    renderDashboardNotifications(notifications);
  } catch (error) {
    console.error('通知一覧取得エラー:', error);
    mount.innerHTML =
      '<div class="error-message">お知らせの読み込みに失敗しました</div>';
  }
}

function renderDashboardNotifications(notifications) {
  const mount = document.getElementById('dashboardNoticeList');
  if (!mount) return;

  if (!notifications || notifications.length === 0) {
    mount.innerHTML = '<div class="empty-message">お知らせはありません</div>';
    return;
  }

  const typeLabels = {
    MESSAGE: 'メッセージ',
    BOOKING_UPDATE: '予約更新',
    BOOKING_CREATED: '予約作成',
    BOOKING_CANCELLED: '予約キャンセル',
    REVIEW: 'レビュー',
    PAYMENT: '決済',
    PAYMENT_FAILED: '決済失敗',
    SYSTEM: 'システム',
    WORKER_APPROVED: 'ワーカー承認',
    WORKER_REJECTED: 'ワーカー却下',
  };

  mount.innerHTML = notifications
    .map((n) => {
      const typeLabel = typeLabels[n.type] || n.type || 'お知らせ';
      const rel = formatNoticeTime(n.createdAt);
      const iso = n.createdAt ? new Date(n.createdAt).toISOString() : '';
      return `
        <article class="notice-item">
          <div class="notice-icon" aria-hidden="true">${noticeIconForType(n.type)}</div>
          <div class="notice-content">
            <div class="notice-title-row">
              <h4 class="notice-title">${escapeHtml(n.title || '')}</h4>
              ${noticeBadgeHtml(n.type, typeLabel)}
            </div>
            <p class="notice-text">${escapeHtml(n.content || '')}</p>
            <time class="notice-time" datetime="${escapeHtml(iso)}">${escapeHtml(rel)}</time>
          </div>
        </article>
      `;
    })
    .join('');
}

window.logout = function () {
  if (confirm('ログアウトしますか？')) {
    logout();
  }
};
</script>
