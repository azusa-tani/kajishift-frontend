<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ワーカーを選択｜KAJISHIFT</title>
  <link rel="preload" href="../css/style.css" as="style" />
  <link rel="stylesheet" href="../css/style.css" />
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <script src="../js/config.js"></script>
  <script src="../js/api.js" defer></script>
  <script src="../js/auth.js" defer></script>
  <script src="../js/socket.js" defer></script>
  <script src="../js/booking-datetime.js" defer></script>
</head>
<body class="customer-page">

<header class="customer-header">
  <div class="container header-inner">
    <div class="logo">KAJISHIFT</div>
    <nav class="nav">
      <a href="dashboard.html">マイページ</a>
      <a href="booking.html">予約する</a>
      <a href="bookings.html">予約一覧</a>
      <a href="payment.html">決済・履歴</a>
    </nav>
    <div class="header-actions">
      <button class="btn-icon" id="notificationBtn" aria-label="通知">
        <span class="notification-badge">2</span>
        🔔
      </button>
      <a href="customer-profile.html" class="avatar">👤</a>
    </div>
  </div>
</header>

<main class="customer-main">
  <div class="container">
    
    <section class="selection-header">
      <div class="back-link">
        <a href="bookings.html">← 予約一覧に戻る</a>
      </div>
      <h1>ワーカーを選択</h1>
      <div class="booking-summary" id="bookingSummary">
        <div class="summary-item">
          <span class="summary-label">日時</span>
          <span class="summary-value" id="summaryDateTime">読み込み中...</span>
        </div>
        <div class="summary-item">
          <span class="summary-label">依頼内容</span>
          <span class="summary-value" id="summaryServiceType">読み込み中...</span>
        </div>
        <div class="summary-item">
          <span class="summary-label">場所</span>
          <span class="summary-value" id="summaryAddress">読み込み中...</span>
        </div>
      </div>
    </section>

    <!-- 利用可能なワーカー -->
    <section class="workers-section">
      <div class="section-header">
        <h2 class="section-title">利用可能なワーカー（<span id="workerCount">0</span>名）</h2>
        <div class="sort-options">
          <select class="filter-select" id="sortSelect">
            <option value="rating">評価順</option>
            <option value="reviewCount">実績順</option>
            <option value="hourlyRate">料金順</option>
          </select>
        </div>
      </div>

      <div class="workers-list" id="workersList">
        <div class="loading-message">ワーカーを読み込み中...</div>
      </div>
    </section>

    <!-- 料金サマリー -->
    <section class="price-summary price-summary--sticky" id="priceSummarySection">
      <div class="price-card">
        <h3>料金サマリー</h3>
        <div class="price-details" id="priceDetails">
          <div class="price-row">
            <span>基本料金（<span id="priceDuration">-</span>時間）</span>
            <span id="basePrice">¥0</span>
          </div>
          <div class="price-row">
            <span>オプション</span>
            <span>¥0</span>
          </div>
          <div class="price-row total">
            <span>合計</span>
            <span id="totalPrice">¥0</span>
          </div>
        </div>
        <p class="price-note">※ 作業完了後に自動決済されます</p>
      </div>
    </section>

    <!-- 確定ボタン -->
    <div class="selection-actions">
      <button type="button" class="btn btn--outline btn-action" onclick="goBackFromWorkerSelection()">戻る</button>
      <button class="btn btn-primary btn-large btn-action" onclick="confirmBooking()">このワーカーで予約確定</button>
    </div>

  </div>
</main>

<footer>
  <div class="container">
    <div class="footer-links">
      <a href="#">ヘルプ</a>
      <a href="../terms.html">利用規約</a>
      <a href="../privacy.html">プライバシーポリシー</a>
      <a href="../legal.html">特定商取引法に基づく表記</a>
      <a href="#">お問い合わせ</a>
    </div>
    <div class="footer-copy">© KAJISHIFT</div>
  </div>
</footer>

<!-- ワーカープロフィールモーダル -->
<div class="modal" id="workerProfileModal">
  <div class="modal-content card-standard modal-content--wide">
    <div class="modal-inline-header">
      <h2>ワーカープロフィール</h2>
      <button class="btn-icon modal-close-lg" onclick="closeModal('workerProfileModal')">×</button>
    </div>
    <div id="workerProfileContent">
      <div class="loading-message">読み込み中...</div>
    </div>
  </div>
</div>

<script src="../js/select-worker.js" defer></script>

</body>
</html>
