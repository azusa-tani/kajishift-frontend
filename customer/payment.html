<!-- カード追加モーダル -->

              <option value="01">01</option>
              <option value="02">02</option>
              <option value="03">03</option>
              <option value="04">04</option>
              <option value="05">05</option>
              <option value="06">06</option>
              <option value="07">07</option>
              <option value="08">08</option>
              <option value="09">09</option>
              <option value="10">10</option>
              <option value="11">11</option>
              <option value="12">12</option>
            </select>
            <select id="expiryYear" class="form-select" required>

<script>
// グローバル変数
let allPayments = [];
let selectedMonth = null;

  // ページ読み込み時の処理
document.addEventListener('DOMContentLoaded', async function() {
  // 認証チェック
  if (!checkAuth('customer')) {
    return;
  }

  // 月選択を初期化
  initMonthFilter();
  
  // 有効期限の年を生成
  initExpiryYear();
  
  // カード番号の自動フォーマット
  setupCardNumberFormat();
  
  // データを読み込み
  await loadPayments();
  await loadCards();
});

// 月選択を初期化
function initMonthFilter() {
  const select = document.getElementById('monthFilter');
  const now = new Date();
  
  // 過去12ヶ月を生成
  for (let i = 0; i < 12; i++) {
    const date = new Date(now.getFullYear(), now.getMonth() - i, 1);
    const option = document.createElement('option');
    option.value = `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}`;
    option.textContent = `${date.getFullYear()}年${date.getMonth() + 1}月`;
    select.appendChild(option);
  }
}

// 決済履歴を読み込む
async function loadPayments() {
  try {
    const select = document.getElementById('monthFilter');
    selectedMonth = select.value;

    // API呼び出し
    const response = await api.getPayments({
      limit: 100 // すべての履歴を取得
    });
    
    if (response.data && response.data.payments) {
      allPayments = response.data.payments;
      
      // フィルター適用
      const filteredPayments = filterPaymentsByMonth(allPayments, selectedMonth);
      
      // 表示
      displayPaymentHistory(filteredPayments);
      displayMonthlySummary(filteredPayments);
    } else {
      throw new Error('予期しないレスポンス形式');
    }
  } catch (error) {
    console.error('決済履歴の読み込みエラー:', error);
    showError('決済履歴の読み込みに失敗しました: ' + (error.message || 'エラーが発生しました'));
  }
}

// 月でフィルター
function filterPaymentsByMonth(payments, monthFilter) {
  if (!monthFilter) {
    return payments;
  }
  
  const [year, month] = monthFilter.split('-').map(Number);
  const firstDay = new Date(year, month - 1, 1);
  const lastDay = new Date(year, month, 0, 23, 59, 59, 999);
  
  return payments.filter(payment => {
    const paymentDate = new Date(payment.createdAt);
    return paymentDate >= firstDay && paymentDate <= lastDay;
  });
}

// 決済履歴を表示
function displayPaymentHistory(payments) {
  const container = document.getElementById('paymentHistoryTable');
  
  if (payments.length === 0) {
    container.innerHTML = '<div class="empty-message">決済履歴がありません</div>';
    return;
  }
  
  let html = `
    <table class="payments-table modern">
      <thead>
        <tr>
          <th>日付</th>
          <th>サービス内容</th>
          <th>ワーカー</th>
          <th>金額</th>
          <th>状態</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody>
  `;
  
  payments.forEach(payment => {
    const paymentDate = new Date(payment.createdAt);
    const dateStr = paymentDate.toLocaleDateString('ja-JP', {
      year: 'numeric',
      month: 'long',
      day: 'numeric'
    });
    
    const serviceType = payment.booking ? payment.booking.serviceType : '-';
    const workerName = payment.booking && payment.booking.worker 
      ? `${payment.booking.worker.name || '不明'}さん` 
      : '-';
    
    const amount = payment.amount ? `¥${payment.amount.toLocaleString()}` : '-';
    
    const statusMap = {
      'COMPLETED': { text: '支払済み', class: 'active' },
      'PENDING': { text: '支払い待ち', class: 'pending' },
      'FAILED': { text: '支払い失敗', class: 'error' },
      'REFUNDED': { text: '返金済み', class: 'refunded' }
    };
    const status = statusMap[payment.status] || { text: payment.status || '-', class: '' };
    
    html += `
      <tr>
        <td>${dateStr}</td>
        <td>${serviceType}</td>
        <td>${workerName}</td>
        <td>${amount}</td>
        <td><span class="status-badge ${status.class}">${status.text}</span></td>
        <td>
          ${payment.status === 'COMPLETED' ? `
            <button class="btn-icon receipt-btn" onclick="downloadReceipt('${payment.id}')" id="receipt-btn-${payment.id}" title="領収書をダウンロード" aria-label="領収書をダウンロード">🧾</button>
          ` : '<span class="muted">-</span>'}
        </td>
      </tr>
    `;
  });
  
  html += `
      </tbody>
    </table>
  `;
  
  container.innerHTML = html;
}

// 月間サマリーを表示
function displayMonthlySummary(payments) {
  const container = document.getElementById('monthlySummary');
  
  const now = new Date();
  const currentMonth = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
  const monthlyPayments = filterPaymentsByMonth(payments, currentMonth);
  
  const count = monthlyPayments.length;
  const total = monthlyPayments.reduce((sum, p) => sum + (p.amount || 0), 0);
  const average = count > 0 ? Math.round(total / count) : 0;
  
  container.innerHTML = `
    <div class="summary-card summary-card--soft">
      <div class="summary-icon">🧾</div>
      <div class="summary-label">今月の利用回数</div>
      <div class="summary-value">${count}回</div>
    </div>
    <div class="summary-card summary-card--soft">
      <div class="summary-icon">💳</div>
      <div class="summary-label">今月の合計金額</div>
      <div class="summary-value">¥${total.toLocaleString()}</div>
    </div>
    <div class="summary-card summary-card--soft">
      <div class="summary-icon">📈</div>
      <div class="summary-label">平均単価</div>
      <div class="summary-value">¥${average.toLocaleString()}</div>
    </div>
  `;
}

// 有効期限の年を生成
function initExpiryYear() {
  const currentYear = new Date().getFullYear();
  const yearSelects = document.querySelectorAll('#expiryYear, #editExpiryYear');
  
  yearSelects.forEach(select => {
    // 既存のオプションをクリア（「年」オプションを除く）
    while (select.children.length > 1) {
      select.removeChild(select.lastChild);
    }
    
    // 現在年から10年後まで生成
    for (let i = 0; i <= 10; i++) {
      const year = currentYear + i;
      const option = document.createElement('option');
      option.value = year;
      option.textContent = year;
      select.appendChild(option);
    }
  });
}

// カード一覧を読み込む
async function loadCards() {
  try {
    const response = await api.getCards();
    const cards = response.data || [];
    displayCards(cards);
  } catch (error) {
    console.error('カード読み込みエラー:', error);
    const container = document.getElementById('paymentMethodCard');
    container.innerHTML = '<div class="error-message">カードの読み込みに失敗しました</div>';
  }
}

// カード一覧を表示
function displayCards(cards) {
  const container = document.getElementById('paymentMethodCard');
  
  if (cards.length === 0) {
    container.innerHTML = `
      <div class="info-note">
        <p>登録されているカードがありません</p>
        <p>カードを追加すると、決済時に使用できます</p>
      </div>
    `;
    return;
  }

  const brandMap = {
    'visa': 'Visa',
    'mastercard': 'Mastercard',
    'amex': 'American Express',
    'jcb': 'JCB',
    'discover': 'Discover',
    'unknown': 'その他'
  };

  container.innerHTML = `<div class="payment-cards">` + cards.map(card => {
    const brand = brandMap[card.brand] || card.brand;
    const brandKey = String(card.brand || 'unknown').toLowerCase();
    const expiryDate = `${String(card.expiryMonth).padStart(2, '0')}/${String(card.expiryYear).slice(-2)}`;
    const defaultBadge = card.isDefault ? '<span class="status-badge active">デフォルト</span>' : '';

    return `
      <div class="credit-card card-brand-${brandKey}" data-card-id="${card.id}">
        <div class="credit-card__brand-row">
          <span class="credit-card__brand" data-brand="${brandKey}">${brand}</span>
          ${defaultBadge}
        </div>
        <div class="credit-card__number">•••• •••• •••• ${card.last4}</div>
        <div class="credit-card__meta">
          <span>EXP ${expiryDate}</span>
          <span>${escapeHtml(card.cardholderName)}</span>
        </div>
        <div class="credit-card__actions">
          ${!card.isDefault ? `<button class="btn-link" onclick="setDefaultCard('${card.id}')">デフォルトに設定</button>` : ''}
          <button class="btn-link" onclick="editCard('${card.id}')">編集</button>
          <button class="btn-link danger" onclick="deleteCard('${card.id}')">削除</button>
        </div>
      </div>
    `;
  }).join('') + `</div>`;
}

// モーダル関連
let currentEditCardId = null;

function openCardModal() {
  document.getElementById('cardForm').reset();
  document.getElementById('cardModalTitle').textContent = 'クレジットカードを追加';
  document.getElementById('cardSubmitBtn').textContent = '追加する';
  document.getElementById('cardModal').classList.add('is-open');
}

function closeCardModal() {
  document.getElementById('cardModal').classList.remove('is-open');
  document.getElementById('cardForm').reset();
  currentEditCardId = null;
}

function closeModal(modalId) {
  document.getElementById(modalId).classList.remove('is-open');
  if (modalId === 'editCardModal') {
    document.getElementById('editCardForm').reset();
    currentEditCardId = null;
  }
}

// カード追加・更新
async function handleCardSubmit(event) {
  event.preventDefault();
  
  const cardNumber = document.getElementById('cardNumber').value.replace(/\s/g, '');
  const expiryMonth = document.getElementById('expiryMonth').value;
  const expiryYear = document.getElementById('expiryYear').value;
  const cardholderName = document.getElementById('cardholderName').value;
  const securityCode = document.getElementById('securityCode').value;
  const isDefault = document.getElementById('isDefault').checked;

  // カード番号のバリデーション
  if (!/^\d{13,19}$/.test(cardNumber)) {
    showError('カード番号が無効です（13-19桁の数字）');
    return;
  }

  // セキュリティコードのバリデーション
  if (!/^\d{3,4}$/.test(securityCode)) {
    showError('セキュリティコードが無効です（3-4桁の数字）');
    return;
  }

  try {
    const submitBtn = document.getElementById('cardSubmitBtn');
    submitBtn.disabled = true;
    submitBtn.textContent = '追加中...';

    await api.addCard({
      cardNumber,
      expiryMonth: parseInt(expiryMonth),
      expiryYear: parseInt(expiryYear),
      cardholderName,
      securityCode,
      isDefault
    });

    showSuccess('カードを追加しました');
    closeCardModal();
    await loadCards();
  } catch (error) {
    console.error('カード追加エラー:', error);
    showError('カードの追加に失敗しました: ' + (error.message || 'エラーが発生しました'));
  } finally {
    const submitBtn = document.getElementById('cardSubmitBtn');
    submitBtn.disabled = false;
    submitBtn.textContent = '追加する';
  }
}

// カード編集
async function editCard(cardId) {
  try {
    const response = await api.getCards();
    const cards = response.data || [];
    const card = cards.find(c => c.id === cardId);

    if (!card) {
      showError('カードが見つかりません');
      return;
    }

    currentEditCardId = cardId;
    document.getElementById('editCardId').value = cardId;
    document.getElementById('editCardLast4').value = `**** **** **** ${card.last4}`;
    document.getElementById('editExpiryMonth').value = String(card.expiryMonth).padStart(2, '0');
    document.getElementById('editExpiryYear').value = card.expiryYear;
    document.getElementById('editCardholderName').value = card.cardholderName;
    document.getElementById('editIsDefault').checked = card.isDefault;

    document.getElementById('editCardModal').classList.add('is-open');
  } catch (error) {
    console.error('カード編集エラー:', error);
    showError('カード情報の取得に失敗しました');
  }
}

// カード更新
async function handleCardUpdate(event) {
  event.preventDefault();

  const cardId = document.getElementById('editCardId').value;
  const expiryMonth = document.getElementById('editExpiryMonth').value;
  const expiryYear = document.getElementById('editExpiryYear').value;
  const cardholderName = document.getElementById('editCardholderName').value;
  const isDefault = document.getElementById('editIsDefault').checked;

  try {
    const submitBtn = document.getElementById('editCardSubmitBtn');
    submitBtn.disabled = true;
    submitBtn.textContent = '更新中...';

    await api.updateCard(cardId, {
      expiryMonth: parseInt(expiryMonth),
      expiryYear: parseInt(expiryYear),
      cardholderName,
      isDefault
    });

    showSuccess('カードを更新しました');
    closeModal('editCardModal');
    await loadCards();
  } catch (error) {
    console.error('カード更新エラー:', error);
    showError('カードの更新に失敗しました: ' + (error.message || 'エラーが発生しました'));
  } finally {
    const submitBtn = document.getElementById('editCardSubmitBtn');
    submitBtn.disabled = false;
    submitBtn.textContent = '更新する';
  }
}

// カード削除
async function deleteCard(cardId) {
  if (!confirm('このカードを削除しますか？')) {
    return;
  }

  try {
    await api.deleteCard(cardId);
    showSuccess('カードを削除しました');
    await loadCards();
  } catch (error) {
    console.error('カード削除エラー:', error);
    showError('カードの削除に失敗しました: ' + (error.message || 'エラーが発生しました'));
  }
}

// デフォルトカードに設定
async function setDefaultCard(cardId) {
  try {
    await api.updateCard(cardId, { isDefault: true });
    showSuccess('デフォルトカードに設定しました');
    await loadCards();
  } catch (error) {
    console.error('デフォルトカード設定エラー:', error);
    showError('デフォルトカードの設定に失敗しました: ' + (error.message || 'エラーが発生しました'));
  }
}

// カード番号の自動フォーマット
function setupCardNumberFormat() {
  const cardNumberInput = document.getElementById('cardNumber');
  if (cardNumberInput) {
    cardNumberInput.addEventListener('input', function(e) {
      let value = e.target.value.replace(/\s/g, '');
      // 数字のみを許可
      value = value.replace(/\D/g, '');
      // 4桁ごとにスペースを挿入
      value = value.replace(/(.{4})/g, '$1 ').trim();
      e.target.value = value;
    });
  }
}

// HTMLエスケープ
function escapeHtml(text) {
  if (!text) return '';
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

// 領収書をダウンロード
async function downloadReceipt(paymentId) {
  try {
    // ボタンを取得
    const button = document.getElementById(`receipt-btn-${paymentId}`);
    if (button) {
      const originalText = button.textContent;
      button.disabled = true;
      button.textContent = 'ダウンロード中...';
      
      await api.downloadReceipt(paymentId);
      
      button.disabled = false;
      button.textContent = originalText;
      showSuccess('領収書をダウンロードしました');
    } else {
      await api.downloadReceipt(paymentId);
      showSuccess('領収書をダウンロードしました');
    }
  } catch (error) {
    console.error('領収書ダウンロードエラー:', error);
    showError('領収書のダウンロードに失敗しました: ' + (error.message || 'エラーが発生しました'));
    
    // エラー時もボタンを有効化
    const button = document.getElementById(`receipt-btn-${paymentId}`);
    if (button) {
      button.disabled = false;
      button.textContent = '領収書';
    }
  }
}

window.onclick = function(event) {
  if (event.target.classList.contains('modal')) {
    event.target.classList.remove('is-open');
  }
}
</script>
