<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>お気に入りワーカー｜KAJISHIFT</title>
  <link rel="preload" href="../css/style.css" as="style" />
  <link rel="stylesheet" href="../css/style.css" />
  <script src="../js/api.js" defer></script>
  <script src="../js/auth.js" defer></script>
</head>
<body class="customer-page">

<header class="customer-header">
  <div class="container header-inner">
    <div class="logo">KAJISHIFT</div>
    <nav class="nav">
      <a href="dashboard.html">マイページ</a>
      <a href="booking.html">予約する</a>
      <a href="bookings.html">予約一覧</a>
      <a href="payment.html">決済・履歴</a>
    </nav>
    <div class="header-actions">
      <button class="btn-icon" id="notificationBtn" aria-label="通知">
        <span class="notification-badge" style="display: none;">0</span>
        🔔
      </button>
      <a href="customer-profile.html" class="avatar">👤</a>
    </div>
  </div>
</header>

<main class="customer-main">
  <div class="container">
    
    <div class="page-header">
      <h1>お気に入りワーカー</h1>
      <p class="page-description">お気に入りに登録したワーカー一覧です</p>
    </div>

    <!-- お気に入り一覧 -->
    <section class="favorites-section">
      <div class="favorites-list" id="favoritesList">
        <div class="loading-message">お気に入りを読み込み中...</div>
      </div>

      <!-- ページネーション -->
      <div class="pagination" id="favoritesPagination" style="display: none;">
        <button class="btn btn-outline" id="favoritesPrevBtn" onclick="changeFavoritesPage(-1)">前へ</button>
        <span class="page-info" id="favoritesPageInfo">1 / 1</span>
        <button class="btn btn-outline" id="favoritesNextBtn" onclick="changeFavoritesPage(1)">次へ</button>
      </div>
    </section>

  </div>
</main>

<footer>
  <div class="container">
    <div class="footer-links">
      <a href="#">ヘルプ</a>
      <a href="../terms.html">利用規約</a>
      <a href="../privacy.html">プライバシーポリシー</a>
      <a href="../legal.html">特定商取引法に基づく表記</a>
      <a href="#">お問い合わせ</a>
    </div>
    <div class="footer-copy">© KAJISHIFT</div>
  </div>
</footer>

<!-- ワーカープロフィールモーダル -->
<div class="modal" id="workerProfileModal">
  <div class="modal-content" style="max-width: 800px; max-height: 90vh; overflow-y: auto;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
      <h2>ワーカープロフィール</h2>
      <button class="btn-icon" onclick="closeModal('workerProfileModal')" style="font-size: 1.5rem;">×</button>
    </div>
    <div id="workerProfileContent">
      <div class="loading-message">読み込み中...</div>
    </div>
  </div>
</div>

<script>
// グローバル変数
let currentFavoritesPage = 1;
let totalFavoritesPages = 1;

// ページ読み込み時の処理
document.addEventListener('DOMContentLoaded', async function() {
  // 認証チェック
  if (!checkAuth('customer')) {
    return;
  }

  // お気に入り一覧を読み込む
  await loadFavorites();
});

// お気に入り一覧を読み込む
async function loadFavorites(page = 1) {
  try {
    currentFavoritesPage = page;
    const response = await api.getFavorites({ page, limit: 12 });
    const { favorites, pagination } = response.data;

    if (favorites.length === 0) {
      displayEmptyFavorites();
      document.getElementById('favoritesPagination').style.display = 'none';
      return;
    }

    displayFavorites(favorites);
    updateFavoritesPagination(pagination);
  } catch (error) {
    console.error('お気に入り読み込みエラー:', error);
    showError('お気に入りの読み込みに失敗しました: ' + (error.message || 'エラーが発生しました'));
    document.getElementById('favoritesList').innerHTML = 
      '<div class="error-message">お気に入りの読み込みに失敗しました</div>';
  }
}

// お気に入り一覧を表示
function displayFavorites(favorites) {
  const listElement = document.getElementById('favoritesList');

  listElement.innerHTML = favorites.map(favorite => {
    const worker = favorite.worker;
    const rating = worker.rating || 0;
    const reviewCount = worker.reviewCount || 0;
    const hourlyRate = worker.hourlyRate || 0;
    const stars = '★'.repeat(Math.floor(rating)) + '☆'.repeat(5 - Math.floor(rating));
    const date = new Date(favorite.createdAt);
    const dateStr = date.toLocaleDateString('ja-JP', {
      year: 'numeric',
      month: 'long',
      day: 'numeric'
    });

    return `
      <div class="favorite-card">
        <div class="favorite-header">
          <div class="worker-avatar-large">👤</div>
          <div class="worker-info">
            <h3>${escapeHtml(worker.name || '名前未設定')}</h3>
            <div class="worker-rating">
              <span class="stars">${stars}</span>
              <span class="rating-score">${rating.toFixed(1)}</span>
              <span class="rating-count">（評価数: ${reviewCount}件）</span>
            </div>
            <div class="favorite-date">登録日: ${dateStr}</div>
          </div>
          <button class="btn-icon btn-favorite favorited" onclick="removeFavorite('${favorite.id}', '${worker.id}')" aria-label="お気に入りから削除">
            <span style="color: #e74c3c;">♥</span>
          </button>
        </div>
        
        ${worker.bio ? `
        <div class="worker-bio">
          <p>${escapeHtml(worker.bio)}</p>
        </div>
        ` : ''}
        
        <div class="worker-stats">
          <div class="stat-item">
            <span class="stat-label">時給</span>
            <span class="stat-value">¥${hourlyRate.toLocaleString()}</span>
          </div>
          <div class="stat-item">
            <span class="stat-label">実績</span>
            <span class="stat-value">${reviewCount}件</span>
          </div>
          <div class="stat-item">
            <span class="stat-label">ステータス</span>
            <span class="stat-value">
              <span class="status-badge ${worker.status === 'ACTIVE' ? 'active' : ''}">
                ${worker.status === 'ACTIVE' ? '活動中' : worker.status || '-'}
              </span>
            </span>
          </div>
        </div>
        
        <div class="favorite-actions">
          <button class="btn btn-primary" onclick="bookWithWorker('${worker.id}')">このワーカーで予約する</button>
          <button class="btn btn-outline" onclick="viewWorkerProfile('${worker.id}')">プロフィールを見る</button>
        </div>
      </div>
    `;
  }).join('');
}

// お気に入りが空の場合の表示
function displayEmptyFavorites() {
  const listElement = document.getElementById('favoritesList');
  listElement.innerHTML = `
    <div class="empty-state">
      <div class="empty-icon">♡</div>
      <h2>お気に入りがありません</h2>
      <p>ワーカーをお気に入りに追加すると、ここに表示されます。</p>
      <a href="select-worker.html" class="btn btn-primary">ワーカーを探す</a>
    </div>
  `;
}

// お気に入りを削除
async function removeFavorite(favoriteId, workerId) {
  if (!confirm('お気に入りから削除しますか？')) {
    return;
  }

  try {
    await api.removeFavorite(favoriteId);
    showSuccess('お気に入りから削除しました');
    // 現在のページを再読み込み
    await loadFavorites(currentFavoritesPage);
  } catch (error) {
    console.error('お気に入り削除エラー:', error);
    showError('お気に入りの削除に失敗しました: ' + (error.message || 'エラーが発生しました'));
  }
}

// ワーカーで予約する
function bookWithWorker(workerId) {
  // 予約ページに遷移（ワーカーIDをパラメータとして渡す）
  window.location.href = `booking.html?workerId=${workerId}`;
}

// ワーカープロフィールを見る
async function viewWorkerProfile(workerId) {
  try {
    document.getElementById('workerProfileContent').innerHTML = '<div class="loading-message">読み込み中...</div>';
    document.getElementById('workerProfileModal').style.display = 'flex';
    
    const response = await api.getWorkerById(workerId);
    const worker = response.data;
    
    if (!worker) {
      throw new Error('ワーカー情報が取得できませんでした');
    }

    const rating = worker.rating || 0;
    const reviewCount = worker.reviewCount || 0;
    const stars = '★'.repeat(Math.floor(rating)) + '☆'.repeat(5 - Math.floor(rating));
    const hourlyRate = worker.hourlyRate || 0;

    const content = `
      <div class="admin-card">
        <div style="text-align: center; margin-bottom: 1.5rem;">
          <div style="font-size: 4rem; margin-bottom: 0.5rem;">👤</div>
          <h2 style="margin-bottom: 0.5rem;">${worker.name || '名前未設定'}</h2>
          <div style="margin-bottom: 0.5rem;">
            <span class="stars">${stars}</span>
            <span class="rating-score">${rating.toFixed(1)}</span>
            <span class="rating-count">（評価数: ${reviewCount}件）</span>
          </div>
        </div>
        
        <div class="info-grid" style="margin-bottom: 1.5rem;">
          <div class="info-item">
            <label>時給</label>
            <div>¥${hourlyRate.toLocaleString()}/時間</div>
          </div>
          <div class="info-item">
            <label>実績</label>
            <div>${reviewCount}件</div>
          </div>
          <div class="info-item">
            <label>完了予約数</label>
            <div>${worker.completedBookings || 0}件</div>
          </div>
        </div>
        
        ${worker.bio ? `
        <div style="margin-bottom: 1.5rem;">
          <label style="display: block; margin-bottom: 0.5rem; font-weight: bold;">自己紹介</label>
          <div style="padding: 0.75rem; background: #f5f5f5; border-radius: 4px; white-space: pre-wrap;">${worker.bio}</div>
        </div>
        ` : ''}
        
        <div id="workerProfileReviews" style="margin-top: 1.5rem;">
          <h3 style="margin-bottom: 1rem;">レビュー</h3>
          <div class="loading-message-small">レビューを読み込み中...</div>
        </div>
      </div>
    `;

    document.getElementById('workerProfileContent').innerHTML = content;
    
    // レビューを読み込む
    await loadWorkerProfileReviews(workerId);
  } catch (error) {
    console.error('ワーカープロフィールの読み込みエラー:', error);
    alert('ワーカープロフィールの読み込みに失敗しました: ' + (error.message || 'エラーが発生しました'));
    document.getElementById('workerProfileContent').innerHTML = '<div class="error-message">エラー: ワーカープロフィールの読み込みに失敗しました</div>';
  }
}

// ワーカープロフィールのレビューを読み込む
async function loadWorkerProfileReviews(workerId) {
  try {
    const response = await api.getReviewsByWorkerId(workerId, { limit: 5 });
    const reviews = response.data?.reviews || [];
    
    const reviewsElement = document.getElementById('workerProfileReviews');
    if (!reviewsElement) return;
    
    if (reviews.length === 0) {
      reviewsElement.innerHTML = '<div class="empty-message-small">レビューがありません</div>';
      return;
    }
    
    const reviewsHTML = reviews.map(review => {
      const stars = '★'.repeat(review.rating) + '☆'.repeat(5 - review.rating);
      const date = new Date(review.createdAt);
      const dateStr = date.toLocaleDateString('ja-JP', {
        year: 'numeric',
        month: 'long',
        day: 'numeric'
      });
      
      return `
        <div style="padding: 1rem; background: #f9f9f9; border-radius: 8px; margin-bottom: 0.75rem;">
          <div style="display: flex; justify-content: space-between; margin-bottom: 0.5rem;">
            <span class="stars">${stars}</span>
            <span style="font-size: 0.875rem; color: #666;">${dateStr}</span>
          </div>
          ${review.comment ? `<p style="margin: 0; white-space: pre-wrap;">${escapeHtml(review.comment)}</p>` : ''}
        </div>
      `;
    }).join('');
    
    reviewsElement.innerHTML = `
      <h3 style="margin-bottom: 1rem;">レビュー</h3>
      ${reviewsHTML}
    `;
  } catch (error) {
    console.error('レビュー読み込みエラー:', error);
    const reviewsElement = document.getElementById('workerProfileReviews');
    if (reviewsElement) {
      reviewsElement.innerHTML = '<div class="error-message-small">レビューの読み込みに失敗しました</div>';
    }
  }
}

function closeModal(modalId) {
  document.getElementById(modalId).style.display = 'none';
}

window.onclick = function(event) {
  if (event.target.classList.contains('modal')) {
    event.target.style.display = 'none';
  }
}

function showSuccess(message) {
  alert('成功: ' + message);
}

function showError(message) {
  alert('エラー: ' + message);
}

// お気に入りページネーションを更新
function updateFavoritesPagination(pagination) {
  currentFavoritesPage = pagination.page;
  totalFavoritesPages = pagination.totalPages;

  const paginationElement = document.getElementById('favoritesPagination');
  const pageInfo = document.getElementById('favoritesPageInfo');
  const prevBtn = document.getElementById('favoritesPrevBtn');
  const nextBtn = document.getElementById('favoritesNextBtn');

  if (totalFavoritesPages <= 1) {
    paginationElement.style.display = 'none';
    return;
  }

  paginationElement.style.display = 'flex';
  pageInfo.textContent = `${currentFavoritesPage} / ${totalFavoritesPages}`;
  prevBtn.disabled = currentFavoritesPage <= 1;
  nextBtn.disabled = currentFavoritesPage >= totalFavoritesPages;
}

// お気に入りページを変更
function changeFavoritesPage(delta) {
  const newPage = currentFavoritesPage + delta;
  if (newPage >= 1 && newPage <= totalFavoritesPages) {
    loadFavorites(newPage);
  }
}

// HTMLエスケープ
function escapeHtml(text) {
  if (!text) return '';
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}
</script>

</body>
</html>
