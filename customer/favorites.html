<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>お気に入りワーカー｜KAJISHIFT</title>
  <link rel="preload" href="../css/style.css" as="style" />
  <link rel="stylesheet" href="../css/style.css" />
  <script src="../js/api.js" defer></script>
  <script src="../js/auth.js" defer></script>
</head>
<body class="customer-page">

<header class="customer-header">
  <div class="container header-inner">
    <div class="logo">KAJISHIFT</div>
    <nav class="nav">
      <a href="dashboard.html">マイページ</a>
      <a href="booking.html">予約する</a>
      <a href="bookings.html">予約一覧</a>
      <a href="payment.html">決済・履歴</a>
    </nav>
    <div class="header-actions">
      <button class="btn-icon" id="notificationBtn" aria-label="通知">
        <span class="notification-badge is-hidden">0</span>
        🔔
      </button>
      <a href="customer-profile.html" class="avatar">👤</a>
    </div>
  </div>
</header>

<main class="customer-main">
  <div class="container">
    
    <div class="page-header">
      <h1>お気に入りワーカー</h1>
      <p class="page-description">お気に入りに登録したワーカー一覧です</p>
    </div>

    <!-- お気に入り一覧 -->
    <section class="favorites-section">
      <div id="favorites-grid" class="favorites-grid">
        <div class="loading-message">お気に入りを読み込み中...</div>
      </div>

      <!-- ページネーション -->
      <div class="pagination is-hidden" id="favoritesPagination">
        <button class="btn btn--outline btn-action" id="favoritesPrevBtn" onclick="changeFavoritesPage(-1)">前へ</button>
        <span class="page-info" id="favoritesPageInfo">1 / 1</span>
        <button class="btn btn--outline btn-action" id="favoritesNextBtn" onclick="changeFavoritesPage(1)">次へ</button>
      </div>
    </section>

  </div>
</main>

<footer>
  <div class="container">
    <div class="footer-links">
      <a href="#">ヘルプ</a>
      <a href="../terms.html">利用規約</a>
      <a href="../privacy.html">プライバシーポリシー</a>
      <a href="../legal.html">特定商取引法に基づく表記</a>
      <a href="#">お問い合わせ</a>
    </div>
    <div class="footer-copy">© KAJISHIFT</div>
  </div>
</footer>

<!-- ワーカープロフィールモーダル -->
<div class="modal" id="workerProfileModal">
  <div class="modal-content card-standard modal-content--wide">
    <div class="modal-inline-header">
      <h2>ワーカープロフィール</h2>
      <button class="btn-icon modal-close-lg" onclick="closeModal('workerProfileModal')">×</button>
    </div>
    <div id="workerProfileContent">
      <div class="loading-message">読み込み中...</div>
    </div>
  </div>
</div>

<script>
// グローバル変数
let currentFavoritesPage = 1;
let totalFavoritesPages = 1;

// ページ読み込み時の処理
document.addEventListener('DOMContentLoaded', async function() {
  // 認証チェック
  if (!checkAuth('customer')) {
    return;
  }

  // お気に入り一覧を読み込む
  await loadFavorites();
});

// お気に入り一覧を読み込む
async function loadFavorites(page = 1) {
  try {
    currentFavoritesPage = page;
    const response = await api.getFavorites({ page, limit: 12 });
    const { favorites, pagination } = response.data;

    if (favorites.length === 0) {
      displayEmptyFavorites();
      document.getElementById('favoritesPagination').classList.add('is-hidden');
      return;
    }

    displayFavorites(favorites);
    updateFavoritesPagination(pagination);
  } catch (error) {
    console.error('お気に入り読み込みエラー:', error);
    showError('お気に入りの読み込みに失敗しました: ' + (error.message || 'エラーが発生しました'));
    document.getElementById('favoritesList').innerHTML = 
      '<div class="error-message">お気に入りの読み込みに失敗しました</div>';
  }
}

// お気に入り一覧を表示
function displayFavorites(favorites) {
  const listElement = document.getElementById('favorites-grid');

  listElement.innerHTML = favorites.map(favorite => {
    const worker = favorite.worker;
    const rating = worker.rating || 0;
    const reviewCount = worker.reviewCount || 0;
    const hourlyRate = worker.hourlyRate || 0;
    const stars = '★'.repeat(Math.floor(rating)) + '☆'.repeat(5 - Math.floor(rating));
    const date = new Date(favorite.createdAt);
    const dateStr = date.toLocaleDateString('ja-JP', {
      year: 'numeric',
      month: 'long',
      day: 'numeric'
    });
    const categoryTags = getWorkerCategoryTags(worker);

    return `
      <article class="favorite-card" data-favorite-id="${favorite.id}" data-worker-id="${worker.id}">
        <button class="btn-icon favorite-remove-btn favorited" onclick="removeFavorite('${favorite.id}', '${worker.id}', this.closest('.favorite-card'))" aria-label="お気に入り解除">
          <span>♥</span>
        </button>

        <div class="favorite-card-top">
          <div class="favorite-avatar">👤</div>
          <div class="favorite-worker-info">
            <h3>${escapeHtml(worker.name || '名前未設定')}</h3>
            <div class="worker-rating">
              <span class="stars">${stars}</span>
              <span class="rating-score">${rating.toFixed(1)}</span>
              <span class="rating-count">(${reviewCount}件)</span>
            </div>
            <div class="favorite-date">登録日: ${dateStr}</div>
          </div>
        </div>

        <div class="favorite-categories">
          ${categoryTags.map(tag => `<span class="category-tag">${escapeHtml(tag)}</span>`).join('')}
        </div>

        ${worker.bio ? `
        <div class="favorite-voice">
          <p>${escapeHtml(worker.bio)}</p>
        </div>
        ` : ''}

        <div class="worker-stats">
          <div class="stat-item">
            <span class="stat-label">時給</span>
            <span class="stat-value">¥${hourlyRate.toLocaleString()}</span>
          </div>
          <div class="stat-item">
            <span class="stat-label">実績</span>
            <span class="stat-value">${reviewCount}件</span>
          </div>
          <div class="stat-item">
            <span class="stat-label">ステータス</span>
            <span class="stat-value">
              <span class="status-badge ${worker.status === 'ACTIVE' ? 'active' : ''}">
                ${worker.status === 'ACTIVE' ? '活動中' : worker.status || '-'}
              </span>
            </span>
          </div>
        </div>

        <div class="favorite-actions">
          <button class="btn btn-primary" onclick="bookWithWorker('${worker.id}')">予約する</button>
          <button class="btn btn-outline" onclick="viewWorkerProfile('${worker.id}')">詳細を見る</button>
        </div>
      </article>
    `;
  }).join('');
}

// お気に入りが空の場合の表示
function displayEmptyFavorites() {
  const listElement = document.getElementById('favorites-grid');
  listElement.innerHTML = `
    <div class="empty-state favorites-empty-state">
      <div class="empty-icon">♡</div>
      <h2>まだお気に入りのワーカーがいません</h2>
      <p>気になるワーカーを見つけて、お気に入りに追加してみましょう。</p>
      <a href="select-worker.html" class="btn btn-primary btn-large">ワーカーを探す</a>
    </div>
  `;
}

// お気に入りを削除
async function removeFavorite(favoriteId, workerId, cardElement) {
  if (!confirm('お気に入りから削除しますか？')) {
    return;
  }

  try {
    if (cardElement) {
      cardElement.classList.add('is-removing');
      await new Promise(resolve => setTimeout(resolve, 180));
    }
    await api.removeFavorite(favoriteId);
    showSuccess('お気に入りから削除しました');

    // 即時反映: カードを除去し、残数確認
    if (cardElement && cardElement.parentNode) {
      cardElement.remove();
    }

    const remainCards = document.querySelectorAll('#favorites-grid .favorite-card');
    if (remainCards.length === 0) {
      await loadFavorites(currentFavoritesPage);
    }
  } catch (error) {
    console.error('お気に入り削除エラー:', error);
    if (cardElement) {
      cardElement.classList.remove('is-removing');
    }
    showError('お気に入りの削除に失敗しました: ' + (error.message || 'エラーが発生しました'));
  }
}

// ワーカーで予約する
function bookWithWorker(workerId) {
  // 予約ページに遷移（ワーカーIDをパラメータとして渡す）
  window.location.href = `booking.html?workerId=${workerId}`;
}

// ワーカープロフィールを見る
async function viewWorkerProfile(workerId) {
  try {
    document.getElementById('workerProfileContent').innerHTML = '<div class="loading-message">読み込み中...</div>';
    document.getElementById('workerProfileModal').classList.add('is-open');
    
    const response = await api.getWorkerById(workerId);
    const worker = response.data;
    
    if (!worker) {
      throw new Error('ワーカー情報が取得できませんでした');
    }

    const rating = worker.rating || 0;
    const reviewCount = worker.reviewCount || 0;
    const stars = '★'.repeat(Math.floor(rating)) + '☆'.repeat(5 - Math.floor(rating));
    const hourlyRate = worker.hourlyRate || 0;

    const content = `
      <div class="admin-card worker-profile-modal-card">
        <div class="worker-profile-modal-top">
          <div class="worker-profile-modal-avatar">👤</div>
          <h2 class="worker-profile-modal-name">${worker.name || '名前未設定'}</h2>
          <div class="worker-profile-modal-rating">
            <span class="stars">${stars}</span>
            <span class="rating-score">${rating.toFixed(1)}</span>
            <span class="rating-count">（評価数: ${reviewCount}件）</span>
          </div>
        </div>
        
        <div class="info-grid worker-profile-modal-grid">
          <div class="info-item">
            <label>時給</label>
            <div>¥${hourlyRate.toLocaleString()}/時間</div>
          </div>
          <div class="info-item">
            <label>実績</label>
            <div>${reviewCount}件</div>
          </div>
          <div class="info-item">
            <label>完了予約数</label>
            <div>${worker.completedBookings || 0}件</div>
          </div>
        </div>
        
        ${worker.bio ? `
        <div class="worker-profile-modal-bio-wrap">
          <label class="worker-profile-modal-label">自己紹介</label>
          <div class="worker-profile-modal-bio">${worker.bio}</div>
        </div>
        ` : ''}
        
        <div id="workerProfileReviews" class="worker-profile-modal-reviews">
          <h3 class="worker-profile-modal-reviews-title">レビュー</h3>
          <div class="loading-message-small">レビューを読み込み中...</div>
        </div>
      </div>
    `;

    document.getElementById('workerProfileContent').innerHTML = content;
    
    // レビューを読み込む
    await loadWorkerProfileReviews(workerId);
  } catch (error) {
    console.error('ワーカープロフィールの読み込みエラー:', error);
    alert('ワーカープロフィールの読み込みに失敗しました: ' + (error.message || 'エラーが発生しました'));
    document.getElementById('workerProfileContent').innerHTML = '<div class="error-message">エラー: ワーカープロフィールの読み込みに失敗しました</div>';
  }
}

// ワーカープロフィールのレビューを読み込む
async function loadWorkerProfileReviews(workerId) {
  try {
    const response = await api.getReviewsByWorkerId(workerId, { limit: 5 });
    const reviews = response.data?.reviews || [];
    
    const reviewsElement = document.getElementById('workerProfileReviews');
    if (!reviewsElement) return;
    
    if (reviews.length === 0) {
      reviewsElement.innerHTML = '<div class="empty-message-small">レビューがありません</div>';
      return;
    }
    
    const reviewsHTML = reviews.map(review => {
      const stars = '★'.repeat(review.rating) + '☆'.repeat(5 - review.rating);
      const date = new Date(review.createdAt);
      const dateStr = date.toLocaleDateString('ja-JP', {
        year: 'numeric',
        month: 'long',
        day: 'numeric'
      });
      
      return `
        <div class="worker-profile-modal-review-item">
          <div class="worker-profile-modal-review-head">
            <span class="stars">${stars}</span>
            <span class="worker-profile-modal-review-date">${dateStr}</span>
          </div>
          ${review.comment ? `<p class="worker-profile-modal-review-comment">${escapeHtml(review.comment)}</p>` : ''}
        </div>
      `;
    }).join('');
    
    reviewsElement.innerHTML = `
      <h3 class="worker-profile-modal-reviews-title">レビュー</h3>
      ${reviewsHTML}
    `;
  } catch (error) {
    console.error('レビュー読み込みエラー:', error);
    const reviewsElement = document.getElementById('workerProfileReviews');
    if (reviewsElement) {
      reviewsElement.innerHTML = '<div class="error-message-small">レビューの読み込みに失敗しました</div>';
    }
  }
}

function closeModal(modalId) {
  document.getElementById(modalId).classList.remove('is-open');
}

window.onclick = function(event) {
  if (event.target.classList.contains('modal')) {
    event.target.classList.remove('is-open');
  }
}

function showSuccess(message) {
  alert('成功: ' + message);
}

function showError(message) {
  alert('エラー: ' + message);
}

// お気に入りページネーションを更新
function updateFavoritesPagination(pagination) {
  currentFavoritesPage = pagination.page;
  totalFavoritesPages = pagination.totalPages;

  const paginationElement = document.getElementById('favoritesPagination');
  const pageInfo = document.getElementById('favoritesPageInfo');
  const prevBtn = document.getElementById('favoritesPrevBtn');
  const nextBtn = document.getElementById('favoritesNextBtn');

  if (totalFavoritesPages <= 1) {
    paginationElement.classList.add('is-hidden');
    return;
  }

  paginationElement.classList.remove('is-hidden');
  pageInfo.textContent = `${currentFavoritesPage} / ${totalFavoritesPages}`;
  prevBtn.disabled = currentFavoritesPage <= 1;
  nextBtn.disabled = currentFavoritesPage >= totalFavoritesPages;
}

// お気に入りページを変更
function changeFavoritesPage(delta) {
  const newPage = currentFavoritesPage + delta;
  if (newPage >= 1 && newPage <= totalFavoritesPages) {
    loadFavorites(newPage);
  }
}

// HTMLエスケープ
function escapeHtml(text) {
  if (!text) return '';
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function getWorkerCategoryTags(worker) {
  const tags = [];
  if (Array.isArray(worker.skills) && worker.skills.length > 0) {
    tags.push(...worker.skills.slice(0, 3));
  }
  if (worker.bio) {
    const bio = worker.bio;
    if (bio.includes('掃除')) tags.push('掃除');
    if (bio.includes('料理')) tags.push('料理');
    if (bio.includes('片付け')) tags.push('片付け');
    if (bio.includes('洗濯')) tags.push('洗濯');
  }
  if (tags.length === 0) {
    tags.push('家事全般', '丁寧対応');
  }
  return Array.from(new Set(tags)).slice(0, 4);
}
</script>

</body>
</html>
