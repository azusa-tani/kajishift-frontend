<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>予約一覧｜KAJISHIFT</title>
  <link rel="preload" href="../css/style.css" as="style" />
  <link rel="stylesheet" href="../css/style.css" />
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <script src="../js/config.js"></script>
  <script src="../js/api.js" defer></script>
  <script src="../js/auth.js" defer></script>
  <script src="../js/socket.js" defer></script>
  <script src="../js/booking-datetime.js" defer></script>
  <script src="../js/customer-bookings.js" defer></script>
</head>
<body class="customer-page">

<header class="customer-header">
  <div class="container header-inner">
    <div class="logo">KAJISHIFT</div>
    <nav class="nav">
      <a href="dashboard.html">マイページ</a>
      <a href="booking.html">予約する</a>
      <a href="bookings.html" class="active">予約一覧</a>
      <a href="payment.html">決済・履歴</a>
    </nav>
    <div class="header-actions">
      <button class="btn-icon" id="notificationBtn" aria-label="通知">
        <span class="notification-badge">2</span>
        🔔
      </button>
      <a href="customer-profile.html" class="avatar">👤</a>
    </div>
  </div>
</header>

<main class="customer-main">
  <div class="container">
    
    <section class="bookings-header">
      <h1>予約一覧</h1>
      <nav class="tab-nav" aria-label="予約タブ">
        <button class="tab-btn active" data-tab="upcoming" aria-selected="true">今後の予約</button>
        <button class="tab-btn" data-tab="past" aria-selected="false">過去の予約</button>
      </nav>
    </section>

    <section class="bookings-shell is-visible" id="bookings-shell">
      <div id="bookings-list" class="bookings-list" aria-live="polite">
        <div class="loading-message">読み込み中...</div>
      </div>
    </section>

  </div>
</main>

<!-- キャンセルモーダル -->
<div class="modal" id="cancelModal">
  <div class="modal-content card-standard">
    <h2>予約をキャンセル</h2>
    <div class="cancellation-fee-info">
      <p><strong>キャンセル料について:</strong></p>
      <ul>
        <li>48時間前まで: 無料</li>
        <li>48-24時間前: 料金の50%</li>
        <li>24時間以内: 料金の100%</li>
      </ul>
      <p class="fee-amount">今回のキャンセル料: <strong>¥0</strong>（48時間以上前のため）</p>
    </div>
    <div class="modal-actions">
      <button class="btn btn--outline btn-action" onclick="closeModal('cancelModal')">戻る</button>
      <button class="btn btn-danger" onclick="confirmCancel()">キャンセル確定</button>
    </div>
  </div>
</div>

<footer>
  <div class="container">
    <div class="footer-links">
      <a href="#">ヘルプ</a>
      <a href="../terms.html">利用規約</a>
      <a href="../privacy.html">プライバシーポリシー</a>
      <a href="../legal.html">特定商取引法に基づく表記</a>
      <a href="#">お問い合わせ</a>
    </div>
    <div class="footer-copy">© KAJISHIFT</div>
  </div>
</footer>

</body>
</html>
