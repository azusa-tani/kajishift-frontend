<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>予約一覧｜KAJISHIFT</title>
  <link rel="preload" href="../css/style.css" as="style" />
  <link rel="stylesheet" href="../css/style.css" />
  <script src="../js/api.js" defer></script>
  <script src="../js/auth.js" defer></script>
</head>
<body class="customer-page">

<header class="customer-header">
  <div class="container header-inner">
    <div class="logo">KAJISHIFT</div>
    <nav class="nav">
      <a href="dashboard.html">マイページ</a>
      <a href="booking.html">予約する</a>
      <a href="bookings.html" class="active">予約一覧</a>
      <a href="payment.html">決済・履歴</a>
    </nav>
    <div class="header-actions">
      <button class="btn-icon" id="notificationBtn" aria-label="通知">
        <span class="notification-badge">2</span>
        🔔
      </button>
      <a href="customer-profile.html" class="avatar">👤</a>
    </div>
  </div>
</header>

<main class="customer-main">
  <div class="container">
    
    <section class="bookings-header">
      <h1>予約一覧</h1>
      <div class="tab-nav">
        <button class="tab-btn active" data-tab="upcoming">今後の予約</button>
        <button class="tab-btn" data-tab="past">過去の予約</button>
      </div>
    </section>

    <!-- 今後の予約 -->
    <div class="tab-content active" id="upcoming-tab">
      <div class="bookings-list" id="upcoming-bookings-list">
        <div class="loading-message">読み込み中...</div>
      </div>
    </div>

    <!-- 過去の予約 -->
    <div class="tab-content" id="past-tab">
      <div class="bookings-list" id="past-bookings-list">
        <div class="loading-message">読み込み中...</div>
      </div>
    </div>

  </div>
</main>

<!-- 予約変更モーダル -->
<div class="modal" id="changeModal">
  <div class="modal-content">
    <h2>予約変更</h2>
    <p>予約内容を変更しますか？48時間前まで無料で変更可能です。</p>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal('changeModal')">キャンセル</button>
      <button class="btn btn-primary" id="changeBookingButton">変更する</button>
    </div>
  </div>
</div>

<!-- キャンセルモーダル -->
<div class="modal" id="cancelModal">
  <div class="modal-content">
    <h2>予約をキャンセル</h2>
    <div class="cancellation-fee-info">
      <p><strong>キャンセル料について:</strong></p>
      <ul>
        <li>48時間前まで: 無料</li>
        <li>48-24時間前: 料金の50%</li>
        <li>24時間以内: 料金の100%</li>
      </ul>
      <p class="fee-amount">今回のキャンセル料: <strong>¥0</strong>（48時間以上前のため）</p>
    </div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal('cancelModal')">戻る</button>
      <button class="btn btn-primary danger" onclick="confirmCancel()">キャンセル確定</button>
    </div>
  </div>
</div>

<footer>
  <div class="container">
    <div class="footer-links">
      <a href="#">ヘルプ</a>
      <a href="../terms.html">利用規約</a>
      <a href="../privacy.html">プライバシーポリシー</a>
      <a href="../legal.html">特定商取引法に基づく表記</a>
      <a href="#">お問い合わせ</a>
    </div>
    <div class="footer-copy">© KAJISHIFT</div>
  </div>
</footer>

<script>
// 認証チェックとデータ読み込み
document.addEventListener('DOMContentLoaded', async function() {
  // 認証チェック
  if (!checkAuth('customer')) {
    return; // リダイレクトされる
  }
  
  // 予約一覧を読み込む
  await loadBookings();
  
  // タブ切り替え
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', function() {
      const tab = this.dataset.tab;
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      this.classList.add('active');
      document.getElementById(tab + '-tab').classList.add('active');
    });
  });
  
  // 予約変更ボタンのイベントリスナーを追加（モーダルが表示された後に設定）
  setupChangeBookingButton();
});

// 予約変更ボタンのイベントリスナーを設定する関数
function setupChangeBookingButton() {
  const changeBookingButton = document.getElementById('changeBookingButton');
  console.log('setupChangeBookingButton called, button found:', changeBookingButton);
  if (changeBookingButton) {
    // 既存のイベントリスナーを削除（重複防止）
    const newButton = changeBookingButton.cloneNode(true);
    changeBookingButton.parentNode.replaceChild(newButton, changeBookingButton);
    
    // 新しいイベントリスナーを追加
    newButton.addEventListener('click', function(e) {
      e.preventDefault();
      e.stopPropagation();
      console.log('変更するボタンがクリックされました');
      proceedToChange();
    });
    console.log('イベントリスナーを追加しました');
  } else {
    console.error('changeBookingButton要素が見つかりません');
  }
}

// 予約一覧を読み込む
async function loadBookings() {
  try {
    // 今後の予約を取得（PENDING, CONFIRMED, IN_PROGRESS）
    const upcomingResponse = await api.getBookings({
      status: 'PENDING,CONFIRMED,IN_PROGRESS',
      page: 1,
      limit: 100
    });
    
    // 過去の予約を取得（COMPLETED, CANCELLED）
    const pastResponse = await api.getBookings({
      status: 'COMPLETED,CANCELLED',
      page: 1,
      limit: 100
    });
    
    // レスポンス形式を確認: { data: { bookings: [...], pagination: {...} } }
    const upcomingBookings = upcomingResponse.data?.bookings || upcomingResponse.data || [];
    const pastBookings = pastResponse.data?.bookings || pastResponse.data || [];
    
    // 今後の予約を表示
    if (upcomingBookings.length > 0) {
      displayBookings(upcomingBookings, 'upcoming-bookings-list');
    } else {
      document.getElementById('upcoming-bookings-list').innerHTML = 
        '<p class="no-data">今後の予約はありません</p>';
    }
    
    // 過去の予約を表示
    if (pastBookings.length > 0) {
      displayBookings(pastBookings, 'past-bookings-list');
    } else {
      document.getElementById('past-bookings-list').innerHTML = 
        '<p class="no-data">過去の予約はありません</p>';
    }
  } catch (error) {
    console.error('予約一覧の取得エラー:', error);
    showError(error.message || '予約一覧の取得に失敗しました。');
    document.getElementById('upcoming-bookings-list').innerHTML = 
      '<p class="error-message">データの読み込みに失敗しました</p>';
    document.getElementById('past-bookings-list').innerHTML = 
      '<p class="error-message">データの読み込みに失敗しました</p>';
  }
}

// 予約を表示
function displayBookings(bookings, containerId) {
  const container = document.getElementById(containerId);
  container.innerHTML = '';
  
  bookings.forEach(booking => {
    const bookingCard = createBookingCard(booking);
    container.appendChild(bookingCard);
  });
}

// 予約カードを作成
function createBookingCard(booking) {
  const card = document.createElement('div');
  card.className = `booking-card-large ${booking.status === 'COMPLETED' || booking.status === 'CANCELLED' ? 'completed' : ''}`;
  
  // 日付と時刻の処理（scheduledDateとstartTime/endTimeまたはdurationを使用）
  const scheduledDate = booking.scheduledDate ? new Date(booking.scheduledDate) : null;
  const startTime = booking.startTime || '';
  const endTime = booking.endTime || '';
  const duration = booking.duration || 2; // デフォルト2時間
  
  let dateStr = '';
  let timeStr = '';
  let hours = duration;
  
  if (scheduledDate) {
    dateStr = scheduledDate.toLocaleDateString('ja-JP', { 
      year: 'numeric', 
      month: 'long', 
      day: 'numeric',
      weekday: 'short'
    });
    
    if (startTime && endTime) {
      timeStr = `${startTime} - ${endTime}`;
      // 時間差を計算
      const [startHour, startMin] = startTime.split(':').map(Number);
      const [endHour, endMin] = endTime.split(':').map(Number);
      const startMinutes = startHour * 60 + startMin;
      const endMinutes = endHour * 60 + endMin;
      hours = (endMinutes - startMinutes) / 60;
    } else if (startTime) {
      // startTimeのみの場合、durationから終了時刻を計算
      const [startHour, startMin] = startTime.split(':').map(Number);
      const endMinutes = startHour * 60 + startMin + (duration * 60);
      const endHour = Math.floor(endMinutes / 60);
      const endMin = endMinutes % 60;
      timeStr = `${startTime} - ${String(endHour).padStart(2, '0')}:${String(endMin).padStart(2, '0')}`;
    } else {
      timeStr = '時間未設定';
    }
  } else {
    dateStr = '日付未設定';
    timeStr = '時間未設定';
  }
  
  const statusText = {
    'PENDING': '予約確定',
    'CONFIRMED': '予約確定',
    'IN_PROGRESS': '進行中',
    'COMPLETED': '完了',
    'CANCELLED': 'キャンセル'
  }[booking.status] || booking.status;
  
  const statusClass = booking.status.toLowerCase().replace('_', '-');
  
  const workerName = booking.worker ? booking.worker.name : '未割り当て';
  const workerRating = booking.worker && booking.worker.rating ? booking.worker.rating.toFixed(1) : null;
  
  // 料金の計算（ワーカーが選択されている場合は時給×時間数で計算）
  let price = booking.totalAmount || 0;
  if (!price && booking.worker && booking.worker.hourlyRate && booking.duration) {
    price = booking.worker.hourlyRate * booking.duration;
  }
  
  let actionsHtml = '';
  if (booking.status === 'COMPLETED' || booking.status === 'CANCELLED') {
    // 過去の予約
    if (booking.status === 'COMPLETED' && !booking.reviewed) {
      actionsHtml = `
        <button class="btn btn-outline" onclick="openReviewModal('${booking.id}')">レビューを書く</button>
        <a href="booking-detail.html?id=${booking.id}" class="btn btn-primary">詳細を見る</a>
      `;
    } else {
      actionsHtml = `
        <span class="reviewed-badge">${booking.reviewed ? 'レビュー済み' : ''}</span>
        <a href="booking-detail.html?id=${booking.id}" class="btn btn-primary">詳細を見る</a>
      `;
    }
  } else {
    // 今後の予約
    actionsHtml = `
      <button class="btn btn-outline" onclick="openChangeModal('${booking.id}')">予約変更</button>
      <button class="btn btn-outline" onclick="openChat('${booking.id}')">チャット</button>
      <button class="btn btn-outline danger" onclick="openCancelModal('${booking.id}')">キャンセル</button>
      <a href="booking-detail.html?id=${booking.id}" class="btn btn-primary">詳細を見る</a>
    `;
  }
  
  card.innerHTML = `
    <div class="booking-card-header">
      <div class="booking-date-time-large">
        <div class="date-large">${dateStr}</div>
        <div class="time-large">${timeStr}（${hours}時間）</div>
      </div>
      <span class="booking-status ${statusClass}">${statusText}</span>
    </div>
    
    <div class="booking-card-body">
      <div class="booking-service">
        <h3>${booking.serviceType || 'サービス'}</h3>
        <p class="booking-address">📍 ${booking.address || '住所未設定'}</p>
      </div>
      
      ${booking.worker ? `
      <div class="booking-worker-info">
        <div class="worker-avatar-small">👤</div>
        <div class="worker-info-text">
          <h4>${workerName}</h4>
          ${workerRating ? `
          <div class="worker-rating-small">
            <span class="stars">${generateStars(workerRating)}</span>
            <span class="rating-score">${workerRating}</span>
          </div>
          ` : ''}
        </div>
      </div>
      ` : ''}
      
      <div class="booking-price">
        <span class="price-label">${booking.status === 'COMPLETED' || booking.status === 'CANCELLED' ? '支払済み' : '料金'}</span>
        <span class="price-amount">${price > 0 ? '¥' + price.toLocaleString() : '未確定'}</span>
      </div>
      
      ${booking.notes ? `
      <div class="booking-notes">
        <h4>依頼内容</h4>
        <p>${booking.notes}</p>
      </div>
      ` : ''}
      
      ${booking.status !== 'COMPLETED' && booking.status !== 'CANCELLED' ? `
      <div class="cancellation-info">
        <p class="info-text">
          <strong>予約変更について:</strong> 48時間前まで無料で変更可能です<br>
          <strong>キャンセル料:</strong> 48-24時間前は50%、24時間以内は100%
        </p>
      </div>
      ` : ''}
    </div>
    
    <div class="booking-card-actions">
      ${actionsHtml}
    </div>
  `;
  
  return card;
}

// 星評価を生成
function generateStars(rating) {
  const fullStars = Math.floor(rating);
  const hasHalfStar = rating % 1 >= 0.5;
  const emptyStars = 5 - fullStars - (hasHalfStar ? 1 : 0);
  
  return '★'.repeat(fullStars) + (hasHalfStar ? '☆' : '') + '☆'.repeat(emptyStars);
}

let currentCancelBookingId = null;

let currentChangeBookingId = null;

function openChangeModal(id) {
  console.log('openChangeModal called with id:', id);
  if (!id) {
    console.error('予約IDが指定されていません');
    alert('予約IDが取得できませんでした');
    return;
  }
  currentChangeBookingId = id;
  console.log('currentChangeBookingId set to:', currentChangeBookingId);
  const modal = document.getElementById('changeModal');
  if (modal) {
    modal.style.display = 'flex';
    // モーダルが表示された後にイベントリスナーを再設定
    setTimeout(() => {
      setupChangeBookingButton();
    }, 100);
  } else {
    console.error('changeModal要素が見つかりません');
  }
}

function proceedToChange() {
  console.log('proceedToChange called');
  console.log('currentChangeBookingId:', currentChangeBookingId);
  if (currentChangeBookingId) {
    const url = `booking.html?id=${currentChangeBookingId}`;
    console.log('Redirecting to:', url);
    window.location.href = url;
  } else {
    console.error('予約IDが取得できませんでした');
    alert('予約IDが取得できませんでした。ページを再読み込みしてください。');
  }
}

// グローバルスコープに明示的に公開
window.proceedToChange = proceedToChange;
window.openChangeModal = openChangeModal;

function openCancelModal(id) {
  currentCancelBookingId = id;
  document.getElementById('cancelModal').style.display = 'flex';
}

function openChat(id) {
  window.location.href = 'chat.html?booking=' + id;
}

function openReviewModal(id) {
  window.location.href = `booking-detail.html?id=${id}&review=true`;
}

function closeModal(modalId) {
  document.getElementById(modalId).style.display = 'none';
  if (modalId === 'cancelModal') {
    currentCancelBookingId = null;
  } else if (modalId === 'changeModal') {
    currentChangeBookingId = null;
  }
}

async function confirmCancel() {
  if (!currentCancelBookingId) return;
  
  if (confirm('本当にキャンセルしますか？')) {
    try {
      await api.cancelBooking(currentCancelBookingId);
      showSuccess('予約をキャンセルしました');
      closeModal('cancelModal');
      // 予約一覧を再読み込み
      await loadBookings();
    } catch (error) {
      console.error('キャンセルエラー:', error);
      showError(error.message || '予約のキャンセルに失敗しました');
    }
  }
}

// モーダル外クリックで閉じる
window.onclick = function(event) {
  if (event.target.classList.contains('modal')) {
    event.target.style.display = 'none';
  }
}
</script>

</body>
</html>
