<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#FF8A65" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="KAJISHIFT" />
  <title>依頼者ログイン｜KAJISHIFT</title>
  <link rel="manifest" href="../manifest.json" />
  <meta name="description" content="KAJISHIFTの依頼者ログインページ。家事代行サービスを利用するためのログイン画面です。" />
  <meta name="robots" content="noindex, nofollow" />
  <link rel="canonical" href="https://kajishift.jp/customer/login.html" />
  <link rel="preload" href="../css/style.css" as="style" />
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="preload" href="../js/validation.js" as="script" />
  <script src="../js/api.js" defer></script>
  <script src="../js/auth.js" defer></script>
  <script src="../js/validation.js" defer></script>
</head>
<body class="customer-login-page">
  <div class="login-container">
    <div class="login-box">
      <div class="login-header">
        <h1>KAJISHIFT</h1>
        <h2>依頼者ログイン</h2>
      </div>
      <div class="error-message"></div>
      <form class="login-form" id="loginForm" novalidate>
        <div class="form-group">
          <label for="email">メールアドレス</label>
          <input 
            type="email" 
            id="email" 
            name="email" 
            class="form-input" 
            required 
            placeholder="example@email.com" 
            autocomplete="username"
            aria-required="true"
            aria-describedby="email-hint" />
          <p id="email-hint" class="sr-only">メールアドレスを入力してください</p>
        </div>

        <div class="form-group">
          <label for="password">パスワード</label>
          <input 
            type="password" 
            id="password" 
            name="password" 
            class="form-input" 
            required 
            autocomplete="current-password"
            aria-required="true"
            aria-describedby="password-hint" />
          <p id="password-hint" class="sr-only">パスワードを入力してください</p>
        </div>

        <div class="form-group">
          <label class="checkbox-item">
            <input 
              type="checkbox" 
              id="remember" 
              name="remember"
              aria-label="ログイン状態を保持する" />
            <span>ログイン状態を保持する</span>
          </label>
        </div>
        <button type="submit" class="btn btn-primary btn-large btn-block" aria-label="ログインボタン">ログイン</button>
        <div class="login-links">
          <a href="register.html">新規登録はこちら</a>
          <a href="#">パスワードを忘れた方</a>
        </div>
        <div class="login-divider">
          <span>または</span>
        </div>
        <button type="button" class="btn btn-secondary btn-large btn-block" onclick="lineLogin()">
          LINEでログイン
        </button>
      </form>
    </div>
  </div>

  <script>
    // ページ読み込み時にバリデーションを設定
    document.addEventListener('DOMContentLoaded', function() {
      setupRealTimeValidation(document.getElementById('email'), Validators.email);
      setupRealTimeValidation(document.getElementById('password'), Validators.required);
    });

    // フォーム送信時のバリデーションとAPI連携
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      
      const validations = {
        'email': Validators.email,
        'password': Validators.required
      };
      
      if (!validateForm(this, validations)) {
        const firstError = this.querySelector('.has-error input');
        if (firstError) {
          firstError.focus();
          firstError.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
        return;
      }
      
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const submitButton = this.querySelector('button[type="submit"]');
      const originalButtonText = submitButton.textContent;
      
      // ローディング状態
      submitButton.disabled = true;
      submitButton.textContent = 'ログイン中...';
      
      try {
        // APIでログイン
        const response = await api.login(email, password);
        
        if (response.data && response.data.user) {
          // ログイン成功
          showSuccess('ログインに成功しました');
          
          // ダッシュボードにリダイレクト
          setTimeout(() => {
            window.location.href = 'dashboard.html';
          }, 500);
        } else {
          throw new Error('ログインに失敗しました');
        }
      } catch (error) {
        // エラー処理
        console.error('ログインエラー:', error);
        showError(error.message || 'ログインに失敗しました。メールアドレスとパスワードを確認してください。');
        submitButton.disabled = false;
        submitButton.textContent = originalButtonText;
      }
    });

    function lineLogin() {
      // LINEログイン処理（実際の実装ではLINE APIを使用）
      alert('LINEログイン機能（実装予定）');
    }
  </script>
  
  <!-- Service Worker Registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('../service-worker.js')
          .then((registration) => {
            console.log('Service Worker registered successfully:', registration.scope);
          })
          .catch((error) => {
            console.error('Service Worker registration failed:', error);
          });
      });
    }
  </script>
</body>
</html>
