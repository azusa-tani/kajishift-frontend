<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>通知一覧｜KAJISHIFT</title>
  <link rel="preload" href="../css/style.css" as="style" />
  <link rel="stylesheet" href="../css/style.css" />
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <script src="../js/config.js"></script>
  <script src="../js/api.js" defer></script>
  <script src="../js/auth.js" defer></script>
  <script src="../js/socket.js" defer></script>
  <script src="../js/notifications.js" defer></script>
</head>
<body class="customer-page">

<header class="customer-header">
  <div class="container header-inner">
    <div class="logo">KAJISHIFT</div>
    <nav class="nav">
      <a href="dashboard.html">マイページ</a>
      <a href="bookings.html">予約一覧</a>
      <a href="payment.html">決済履歴</a>
      <a href="customer-profile.html">プロフィール</a>
    </nav>
    <div class="header-actions">
      <a href="notifications.html" class="btn-icon" id="notificationBtn" aria-label="通知">
        <span class="notification-badge is-hidden">0</span>
        🔔
      </a>
      <a href="customer-profile.html" class="avatar">👤</a>
    </div>
  </div>
</header>

<main class="customer-main">
  <div class="container">

    <section class="payment-header notifications-page-header">
      <div class="notifications-page-header__row">
        <div class="notifications-page-header__intro">
          <h1>通知一覧</h1>
          <p>予約・メッセージ・お支払いなどのお知らせを確認できます</p>
        </div>
        <button type="button" class="btn btn-primary btn-small" id="markAllRead">すべて既読にする</button>
      </div>
    </section>

    <section class="notifications-controls-card" aria-label="通知の絞り込み">
      <div class="section-header notifications-section-header">
        <div class="notifications-filters">
          <select class="filter-select" id="filterStatus" aria-label="既読状態で絞り込み">
            <option value="">すべて</option>
            <option value="false">未読のみ</option>
            <option value="true">既読のみ</option>
          </select>
          <select class="filter-select" id="filterType" aria-label="通知の種類で絞り込み">
            <option value="">すべての種類</option>
            <option value="MESSAGE">メッセージ</option>
            <option value="BOOKING_UPDATE">予約更新</option>
            <option value="BOOKING_CREATED">予約作成</option>
            <option value="BOOKING_CANCELLED">予約キャンセル</option>
            <option value="REVIEW">レビュー</option>
            <option value="PAYMENT">決済</option>
            <option value="PAYMENT_FAILED">決済失敗</option>
            <option value="SYSTEM">システム</option>
          </select>
        </div>
      </div>
    </section>

    <section class="notifications-section">
      <div class="notification-container">
        <div id="notifications-list" class="notifications-list notifications-list--cards">
          <div class="notifications-loading" role="status" aria-live="polite">
            <span class="notifications-loading__spinner" aria-hidden="true"></span>
            <span class="notifications-loading__text">読み込み中...</span>
          </div>
        </div>
      </div>

      <div class="pagination is-hidden" id="pagination">
        <button type="button" class="btn btn-outline" id="prevBtn">前へ</button>
        <span class="page-info" id="pageInfo">1 / 1</span>
        <button type="button" class="btn btn-outline" id="nextBtn">次へ</button>
      </div>
    </section>

  </div>
</main>

<footer>
  <div class="container">
    <div class="footer-links">
      <a href="#">ヘルプ</a>
      <a href="../terms.html">利用規約</a>
      <a href="../privacy.html">プライバシーポリシー</a>
      <a href="../legal.html">特定商取引法に基づく表記</a>
      <a href="#">お問い合わせ</a>
    </div>
    <div class="footer-copy">© KAJISHIFT</div>
  </div>
</footer>

</body>
</html>
