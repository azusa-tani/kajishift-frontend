<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>チャット｜KAJISHIFT（ワーカー）</title>
  <link rel="preload" href="../css/style.css" as="style" />
  <link rel="stylesheet" href="../css/style.css" />
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <script src="../js/config.js"></script>
  <script src="../js/api.js" defer></script>
  <script src="../js/auth.js" defer></script>
  <script src="../js/socket.js" defer></script>
  <script src="../js/worker-notification-badge.js" defer></script>
</head>
<body class="worker-page">

<header class="worker-header" role="banner">
  <div class="container header-inner">
    <div class="logo">KAJISHIFT</div>
    <nav class="nav" role="navigation" aria-label="メインナビゲーション">
      <a href="dashboard.html">ダッシュボード</a>
      <a href="jobs.html">仕事を探す</a>
      <a href="calendar.html">カレンダー</a>
      <a href="rewards.html">報酬</a>
      <a href="profile.html">プロフィール</a>
    </nav>
    <div class="header-actions">
      <a href="notifications.html" class="btn-icon" id="notificationBtn" aria-label="通知">
        <span class="notification-badge is-hidden" aria-hidden="true">0</span>
        <span aria-hidden="true">🔔</span>
      </a>
      <a href="profile.html" class="avatar" aria-label="プロフィールページへ移動">👤</a>
    </div>
  </div>
</header>

<main class="chat-main">
  <div class="container">
    
    <!-- チャットヘッダー -->
    <div class="chat-header-bar">
      <div class="back-link-small">
        <a href="jobs.html">← 戻る</a>
      </div>
      <div class="chat-partner-info" id="chatPartnerInfo">
        <div class="chat-avatar">👤</div>
        <div class="chat-partner-text">
          <h2 id="partnerName">読み込み中...</h2>
          <p class="chat-status" id="partnerStatus"><span class="status-dot" aria-hidden="true"></span>-</p>
        </div>
      </div>
      <div class="chat-menu-container">
        <button class="btn-icon" id="chatMenuBtn" aria-label="メニュー">⋯</button>
        <div class="chat-menu-dropdown is-hidden" id="chatMenuDropdown">
          <button class="chat-menu-item" id="viewBookingDetailBtn">
            <span>📋</span> 仕事詳細を見る
          </button>
          <button class="chat-menu-item" id="viewBookingListBtn">
            <span>📝</span> 仕事一覧に戻る
          </button>
        </div>
      </div>
    </div>

    <!-- チャットメッセージエリア -->
    <div class="chat-messages" id="chatMessages">
      <div class="loading-message">メッセージを読み込み中...</div>
    </div>

    <!-- チャット入力エリア -->
    <div class="chat-input-area">
      <button class="btn-icon chat-attach-btn" id="attachBtn" aria-label="画像添付">＋</button>
      <input type="file" id="fileInput" class="is-hidden" accept="image/*" />
      <textarea 
        class="chat-input" 
        id="messageInput" 
        placeholder="メッセージを入力..."
        rows="1"
      ></textarea>
      <button class="btn btn-primary chat-send-btn" id="sendBtn" aria-label="送信">✈</button>
    </div>

  </div>
</main>

<script>
// グローバル変数
let bookingId = null;
let currentBooking = null;
let currentUserId = null;
let loadedMessageIds = new Set(); // 既に表示したメッセージIDを記録
let tempMessageIds = new Set(); // 一時メッセージIDを追跡
let lastSentAnimAt = 0;
let sentBurstCount = 0;

// ページ読み込み時の処理
document.addEventListener('DOMContentLoaded', async function() {
  // 認証チェック
  if (!checkAuth('worker')) {
    return;
  }

  // URLパラメータから予約IDを取得（bookingまたはbookingIdの両方に対応）
  const urlParams = new URLSearchParams(window.location.search);
  bookingId = urlParams.get('booking') || urlParams.get('bookingId');

  if (!bookingId) {
    alert('予約IDが指定されていません');
    window.location.href = 'jobs.html';
    return;
  }
  
  console.log('チャットページ: 予約IDを取得しました:', bookingId);

  // ユーザー情報を取得
  const user = api.getUser();
  if (user && user.id) {
    currentUserId = user.id;
  } else {
    const userResponse = await api.getUserMe();
    if (userResponse.data) {
      currentUserId = userResponse.data.id;
    }
  }

  // 予約情報を取得
  await loadBookingInfo();
  
  // 初期メッセージを読み込み
  await loadMessages();
  
  const token = localStorage.getItem('token');
  if (token && typeof socketManager !== 'undefined') {
    socketManager.ensureConnected(token);

    socketManager.onMessage((message) => {
      console.log('WebSocketでメッセージを受信:', message);
      // この予約に関連するメッセージのみ処理
      if (message && String(message.bookingId) === String(bookingId)) {
        // 既に表示済みのメッセージはスキップ
        if (!loadedMessageIds.has(message.id)) {
          // 送信したメッセージの場合、一時メッセージを削除
          if (message.senderId === currentUserId) {
            // 一時メッセージを探して削除
            tempMessageIds.forEach(tempId => {
              const tempElement = document.getElementById(tempId);
              if (tempElement) {
                tempElement.remove();
                tempMessageIds.delete(tempId);
              }
            });
          }
          // 実際のメッセージを追加
          const messageType = message.senderId === currentUserId ? 'sent' : 'received';
          addMessageToUI(message.content || '', messageType, message, { animate: messageType === 'received' });
          loadedMessageIds.add(message.id);
        }
      }
    });
  }

  // イベントリスナーを設定
  setupEventListeners();
  
  // チャットメニューボタンのイベントリスナー
  setupChatMenu();
});

// チャットメニューの設定
function setupChatMenu() {
  const menuBtn = document.getElementById('chatMenuBtn');
  const menuDropdown = document.getElementById('chatMenuDropdown');
  
  if (!menuBtn || !menuDropdown) {
    console.error('チャットメニュー要素が見つかりません');
    return;
  }
  
  // メニューボタンのクリックイベント
  menuBtn.addEventListener('click', function(e) {
    e.stopPropagation();
    const isVisible = !menuDropdown.classList.contains('is-hidden');
    menuDropdown.classList.toggle('is-hidden', isVisible);
  });
  
  // メニュー外をクリックしたら閉じる
  document.addEventListener('click', function(e) {
    if (!menuBtn.contains(e.target) && !menuDropdown.contains(e.target)) {
      menuDropdown.classList.add('is-hidden');
    }
  });
  
  const viewBookingDetailBtn = document.getElementById('viewBookingDetailBtn');
  if (viewBookingDetailBtn) {
    viewBookingDetailBtn.addEventListener('click', function() {
      if (bookingId) {
        window.location.href = `job-detail.html?id=${encodeURIComponent(bookingId)}`;
      } else {
        alert('予約IDが取得できません');
      }
      menuDropdown.classList.add('is-hidden');
    });
  }

  const viewBookingListBtn = document.getElementById('viewBookingListBtn');
  if (viewBookingListBtn) {
    viewBookingListBtn.addEventListener('click', function() {
      window.location.href = 'jobs.html';
      menuDropdown.classList.add('is-hidden');
    });
  }
}

// イベントリスナーの設定
function setupEventListeners() {
  // 画像添付
  document.getElementById('attachBtn').addEventListener('click', function() {
    document.getElementById('fileInput').click();
  });

  document.getElementById('fileInput').addEventListener('change', async function(e) {
    if (e.target.files.length > 0) {
      const file = e.target.files[0];
      
      // ファイルサイズチェック（10MB以下）
      if (file.size > 10 * 1024 * 1024) {
        alert('ファイルサイズは10MB以下にしてください');
        e.target.value = '';
        return;
      }
      
      // ファイルタイプチェック（画像のみ）
      if (!file.type.startsWith('image/')) {
        alert('画像ファイルを選択してください');
        e.target.value = '';
        return;
      }
      
      // 画像をアップロードして送信
      await sendImageMessage(file);
      e.target.value = ''; // リセット
    }
  });

  // メッセージ送信
  document.getElementById('sendBtn').addEventListener('click', sendMessage);
  document.getElementById('messageInput').addEventListener('keypress', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  // テキストエリアの自動リサイズ
  const textarea = document.getElementById('messageInput');
  textarea.addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = (this.scrollHeight) + 'px';
  });
}

// 予約情報を読み込む
async function loadBookingInfo() {
  try {
    const response = await api.getBookingById(bookingId);
    currentBooking = response.data != null ? response.data : response;

    if (!currentBooking) {
      throw new Error('予約が見つかりません');
    }

    const cust = currentBooking.customer;
    const statusEl = document.getElementById('partnerStatus');
    if (cust && cust.name) {
      document.getElementById('partnerName').textContent = `${cust.name}さん`;
      if (statusEl) {
        statusEl.innerHTML = '<span class="status-dot" aria-hidden="true"></span>依頼者';
      }
    } else {
      document.getElementById('partnerName').textContent = '依頼者';
      if (statusEl) {
        statusEl.innerHTML = '<span class="status-dot" aria-hidden="true"></span>-';
      }
    }
  } catch (error) {
    console.error('予約情報の読み込みエラー:', error);
    showError('予約情報の読み込みに失敗しました');
  }
}

// メッセージを読み込む（初回読み込み用）
async function loadMessages() {
  try {
    const response = await api.getMessages(bookingId, { limit: 100 });
    
    if (response.data && response.data.messages) {
      const messages = response.data.messages;
      displayMessages(messages);
      
      // 読み込んだメッセージIDを記録
      messages.forEach(msg => {
        loadedMessageIds.add(msg.id);
      });
    }
  } catch (error) {
    console.error('メッセージの読み込みエラー:', error);
    const container = document.getElementById('chatMessages');
    container.innerHTML = `<div class="error-message">メッセージの読み込みに失敗しました: ${error.message || 'エラーが発生しました'}</div>`;
  }
}

// メッセージを表示
function displayMessages(messages) {
  const container = document.getElementById('chatMessages');
  
  if (messages.length === 0) {
    container.innerHTML = '<div class="empty-message">メッセージがありません</div>';
    return;
  }

  let html = '';
  let currentDate = null;

  messages.forEach(message => {
    const messageDate = new Date(message.createdAt);
    const dateStr = messageDate.toLocaleDateString('ja-JP', {
      year: 'numeric',
      month: 'long',
      day: 'numeric'
    });
    
    // 日付が変わったら日付ラベルを表示
    if (!currentDate || currentDate !== dateStr) {
      html += `<div class="message-date">${dateStr}</div>`;
      currentDate = dateStr;
    }

    const isSent = message.senderId === currentUserId;
    const timeStr = messageDate.toLocaleTimeString('ja-JP', {
      hour: '2-digit',
      minute: '2-digit'
    });

    const imageUrl = message.imageUrl || message.image;
    
    if (isSent) {
      html += `
        <div class="message sent">
          <div class="message-content">
            ${imageUrl ? `
              <div class="message-image">
                <img src="${imageUrl}" class="chat-image-clickable" alt="送信された画像" onclick="openImageModal('${imageUrl}')" />
              </div>
            ` : ''}
            ${message.content && message.content !== '[画像]' ? `
              <div class="message-text">${escapeHtml(message.content)}</div>
            ` : ''}
            <div class="message-time">${timeStr}</div>
          </div>
        </div>
      `;
    } else {
      const senderName = message.sender ? message.sender.name : '不明';
      html += `
        <div class="message received">
          <div class="message-avatar">👤</div>
          <div class="message-content">
            ${imageUrl ? `
              <div class="message-image">
                <img src="${imageUrl}" class="chat-image-clickable" alt="受信した画像" onclick="openImageModal('${imageUrl}')" />
              </div>
            ` : ''}
            ${message.content && message.content !== '[画像]' ? `
              <div class="message-text">${escapeHtml(message.content)}</div>
            ` : ''}
            <div class="message-time">${timeStr}</div>
          </div>
        </div>
      `;
    }
  });

  container.innerHTML = html;
  scrollToBottom();
}

// メッセージを送信
async function sendMessage() {
  const input = document.getElementById('messageInput');
  const text = input.value.trim();
  
  if (!text) {
    return;
  }

  if (!bookingId) {
    alert('予約IDが取得できません');
    return;
  }

  // 送信前にUIに表示（楽観的更新）
  const tempId = 'temp-' + Date.now();
  tempMessageIds.add(tempId);
  const tempMessage = {
    id: tempId,
    content: text,
    senderId: currentUserId,
    createdAt: new Date().toISOString()
  };
  addMessageToUI(text, 'sent', tempMessage, { animateSent: true });
  const originalText = text; // エラー時の復元用
  input.value = '';
  
  try {
    // APIで送信
    const response = await api.sendMessage({
      bookingId: bookingId,
      content: text
    });
    
    console.log('メッセージ送信成功:', response);
    
    // 送信成功後、実際のメッセージIDを取得できた場合は一時メッセージを更新
    if (response && response.data && response.data.id) {
      const actualMessageId = response.data.id;
      const tempElement = document.getElementById(tempId);
      if (tempElement) {
        tempElement.id = actualMessageId;
        loadedMessageIds.add(actualMessageId);
        tempMessageIds.delete(tempId);
      }
    } else {
      // メッセージIDが取得できない場合は、メッセージ一覧を再読み込み
      setTimeout(async () => {
        const tempElement = document.getElementById(tempId);
        if (tempElement && tempMessageIds.has(tempId)) {
          // 一時メッセージがまだ残っている場合、メッセージ一覧を再読み込み
          await loadMessages();
          tempMessageIds.delete(tempId);
        }
      }, 2000);
    }
  } catch (error) {
    console.error('メッセージ送信エラー:', error);
    showError('メッセージの送信に失敗しました: ' + (error.message || 'エラーが発生しました'));
    // エラー時は入力内容を復元
    input.value = originalText;
    // 一時メッセージを削除
    const tempElement = document.getElementById(tempId);
    if (tempElement) {
      tempElement.remove();
      tempMessageIds.delete(tempId);
    }
  }
}

// 画像メッセージを送信
async function sendImageMessage(file) {
  if (!bookingId) {
    alert('予約IDが取得できません');
    return;
  }

  try {
    // プレビューを表示（楽観的更新）
    const reader = new FileReader();
    reader.onload = function(event) {
      const imageUrl = event.target.result;
      const tempId = 'temp-image-' + Date.now();
      const tempMessage = {
        id: tempId,
        content: '[画像を送信中...]',
        imageUrl: imageUrl,
        senderId: currentUserId,
        createdAt: new Date().toISOString()
      };
      addImageMessageToUI(imageUrl, 'sent', tempMessage, tempId);
    };
    reader.readAsDataURL(file);

    // 画像をアップロード
    const uploadResponse = await api.uploadFile(file, 'MESSAGE');
    const imageUrl = uploadResponse.data?.url || uploadResponse.data?.fileUrl;
    
    if (!imageUrl) {
      throw new Error('画像のアップロードに失敗しました');
    }

    // メッセージとして送信
    await api.sendMessage({
      bookingId: bookingId,
      content: '[画像]',
      imageUrl: imageUrl
    });

    // 一時メッセージを削除（実際のメッセージがWebSocketで来るため）
    setTimeout(() => {
      const tempElement = document.getElementById('temp-image-' + Date.now());
      if (tempElement) {
        tempElement.remove();
      }
    }, 1000);
  } catch (error) {
    console.error('画像送信エラー:', error);
    showError('画像の送信に失敗しました: ' + (error.message || 'エラーが発生しました'));
    // エラー時は一時メッセージを削除
    const tempElements = document.querySelectorAll('[id^="temp-image-"]');
    tempElements.forEach(el => el.remove());
  }
}

// UIにメッセージを追加
function addMessageToUI(text, type, message, options = {}) {
  const container = document.getElementById('chatMessages');
  
  // 空のメッセージを削除
  const emptyMessage = container.querySelector('.empty-message');
  if (emptyMessage) {
    emptyMessage.remove();
  }
  
  const messageDate = new Date(message.createdAt || new Date());
  const dateStr = messageDate.toLocaleDateString('ja-JP', {
    year: 'numeric',
    month: 'long',
    day: 'numeric'
  });
  
  // 日付ラベルを追加（必要に応じて）
  const lastDateLabel = container.querySelector('.message-date:last-of-type');
  const lastDate = lastDateLabel ? lastDateLabel.textContent : null;
  if (lastDate !== dateStr) {
    const dateLabel = document.createElement('div');
    dateLabel.className = 'message-date';
    dateLabel.textContent = dateStr;
    container.appendChild(dateLabel);
  }
  
  const messageDiv = document.createElement('div');
  messageDiv.className = `message ${type}`;
  messageDiv.id = message.id || 'temp-' + Date.now();
  if (options.animate) {
    messageDiv.classList.add('message-enter');
  }
  if (options.animateSent && type === 'sent') {
    messageDiv.classList.add('message-sent-enter');
    const delayMs = getSentStaggerDelay();
    messageDiv.style.setProperty('--sent-stagger-delay', `${delayMs}ms`);
  }
  
  const timeStr = messageDate.toLocaleTimeString('ja-JP', {
    hour: '2-digit',
    minute: '2-digit'
  });
  
  const imageUrl = message.imageUrl || message.image;
  
  if (type === 'sent') {
    messageDiv.innerHTML = `
      <div class="message-content">
        ${imageUrl ? `
          <div class="message-image">
            <img src="${imageUrl}" class="chat-image-clickable" alt="送信された画像" onclick="openImageModal('${imageUrl}')" />
          </div>
        ` : ''}
        ${text && text !== '[画像]' && text !== '[画像を送信中...]' ? `
          <div class="message-text">${escapeHtml(text)}</div>
        ` : ''}
        <div class="message-time">${timeStr}</div>
      </div>
    `;
  } else {
    const senderName = message.sender ? message.sender.name : '不明';
    messageDiv.innerHTML = `
      <div class="message-avatar">👤</div>
      <div class="message-content">
        ${imageUrl ? `
          <div class="message-image">
            <img src="${imageUrl}" class="chat-image-clickable" alt="受信した画像" onclick="openImageModal('${imageUrl}')" />
          </div>
        ` : ''}
        ${text && text !== '[画像]' ? `
          <div class="message-text">${escapeHtml(text)}</div>
        ` : ''}
        <div class="message-time">${timeStr}</div>
      </div>
    `;
  }
  
  container.appendChild(messageDiv);
  if (options.animate) {
    requestAnimationFrame(() => {
      messageDiv.classList.add('is-visible');
    });
  }
  if (options.animateSent && type === 'sent') {
    requestAnimationFrame(() => {
      messageDiv.classList.add('is-visible-sent');
    });
  }
  scrollToBottom();
}

// 連投時にだけ短いスタッガーをつける（トトトンッ: 0ms -> 40ms -> 80ms -> 120ms）
function getSentStaggerDelay() {
  const now = Date.now();
  const burstWindowMs = 850;
  const stepMs = 40;
  const maxDelayMs = 120;

  if (now - lastSentAnimAt > burstWindowMs) {
    sentBurstCount = 0;
  } else {
    sentBurstCount += 1;
  }

  lastSentAnimAt = now;
  return Math.min(sentBurstCount * stepMs, maxDelayMs);
}

// HTMLエスケープ
function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

// スクロールを最下部に
function scrollToBottom() {
  const messagesDiv = document.getElementById('chatMessages');
  messagesDiv.scrollTop = messagesDiv.scrollHeight;
}

// 画像メッセージをUIに追加
function addImageMessageToUI(imageUrl, type, message, messageId) {
  const container = document.getElementById('chatMessages');
  
  // 空のメッセージを削除
  const emptyMessage = container.querySelector('.empty-message');
  if (emptyMessage) {
    emptyMessage.remove();
  }
  
  const messageDate = new Date(message.createdAt || new Date());
  const timeStr = messageDate.toLocaleTimeString('ja-JP', {
    hour: '2-digit',
    minute: '2-digit'
  });
  
  const messageDiv = document.createElement('div');
  messageDiv.className = `message ${type}`;
  messageDiv.id = messageId;
  
  if (type === 'sent') {
    messageDiv.innerHTML = `
      <div class="message-content">
        <div class="message-image">
          <img src="${imageUrl}" class="chat-image-clickable" alt="送信された画像" onclick="openImageModal('${imageUrl}')" />
        </div>
        <div class="message-time">${timeStr}</div>
      </div>
    `;
  } else {
    messageDiv.innerHTML = `
      <div class="message-avatar">👤</div>
      <div class="message-content">
        <div class="message-image">
          <img src="${imageUrl}" class="chat-image-clickable" alt="受信した画像" onclick="openImageModal('${imageUrl}')" />
        </div>
        <div class="message-time">${timeStr}</div>
      </div>
    `;
  }
  
  container.appendChild(messageDiv);
  scrollToBottom();
}

// 画像モーダルを開く
function openImageModal(imageUrl) {
  const modal = document.createElement('div');
  modal.className = 'modal modal-image-viewer is-open';
  modal.innerHTML = `
    <div class="image-viewer-frame">
      <button class="btn-icon image-viewer-close" onclick="this.closest('.modal').remove()">×</button>
      <img src="${imageUrl}" class="image-viewer-image" alt="拡大画像" />
    </div>
  `;
  modal.onclick = function(e) {
    if (e.target === modal) {
      modal.remove();
    }
  };
  document.body.appendChild(modal);
}

// ユーティリティ関数
function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

</script>

</body>
</html>
