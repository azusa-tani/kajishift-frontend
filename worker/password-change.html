<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>パスワード変更｜KAJISHIFT（ワーカー）</title>
  <link rel="preload" href="../css/style.css" as="style" />
  <link rel="stylesheet" href="../css/style.css" />
  <script src="../js/config.js"></script>
  <script src="../js/api.js" defer></script>
  <script src="../js/auth.js" defer></script>
  <script src="../js/worker-notification-badge.js" defer></script>
</head>
<body class="worker-page">

<header class="worker-header">
  <div class="container header-inner">
    <div class="logo">KAJISHIFT</div>
    <nav class="nav">
      <a href="dashboard.html">ダッシュボード</a>
      <a href="jobs.html">仕事を探す</a>
      <a href="calendar.html">カレンダー</a>
      <a href="rewards.html">報酬</a>
      <a href="profile.html" class="active">プロフィール</a>
    </nav>
    <div class="header-actions">
      <a href="notifications.html" class="btn-icon" id="notificationBtn" aria-label="通知">
        <span class="notification-badge is-hidden" aria-hidden="true">0</span>
        <span aria-hidden="true">🔔</span>
      </a>
      <a href="profile.html" class="avatar">👤</a>
    </div>
  </div>
</header>

<main class="worker-main">
  <div class="container">
    <section class="page-header">
      <h1>パスワード変更</h1>
      <p class="text-muted">現在のパスワードを入力のうえ、新しいパスワードを設定してください（8文字以上、英字と数字を含む）。</p>
    </section>

    <section class="section-block card-standard" style="max-width: 520px">
      <form id="passwordForm">
        <div class="form-group">
          <label for="currentPassword">現在のパスワード <span class="required">*</span></label>
          <input type="password" id="currentPassword" class="form-input" required autocomplete="current-password" />
        </div>
        <div class="form-group">
          <label for="newPassword">新しいパスワード <span class="required">*</span></label>
          <input type="password" id="newPassword" class="form-input" required minlength="8" autocomplete="new-password" />
        </div>
        <div class="form-group">
          <label for="confirmPassword">新しいパスワード（確認） <span class="required">*</span></label>
          <input type="password" id="confirmPassword" class="form-input" required minlength="8" autocomplete="new-password" />
        </div>
        <div class="modal-actions" style="margin-top: 1rem">
          <a href="profile.html" class="btn btn--outline btn-action">戻る</a>
          <button type="submit" class="btn btn-primary btn-action" id="submitBtn">変更する</button>
        </div>
      </form>
    </section>
  </div>
</main>

<footer>
  <div class="container">
    <div class="footer-links">
      <a href="../terms.html">利用規約</a>
      <a href="../privacy.html">プライバシーポリシー</a>
    </div>
    <div class="footer-copy">© KAJISHIFT</div>
  </div>
</footer>

<script>
document.addEventListener('DOMContentLoaded', async function () {
  if (!checkAuth('worker')) return;

  document.getElementById('passwordForm').addEventListener('submit', async function (e) {
    e.preventDefault();
    const currentPassword = document.getElementById('currentPassword').value;
    const newPassword = document.getElementById('newPassword').value;
    const confirmPassword = document.getElementById('confirmPassword').value;

    if (newPassword !== confirmPassword) {
      showError('新しいパスワードが一致しません');
      return;
    }

    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    try {
      await api.changePassword({ currentPassword, newPassword });
      showSuccess('パスワードを変更しました。プロフィールへ戻ります。');
      setTimeout(function () {
        window.location.href = 'profile.html';
      }, 1500);
    } catch (err) {
      showError(err.message || 'パスワードの変更に失敗しました');
      btn.disabled = false;
    }
  });
});
</script>
</body>
</html>
